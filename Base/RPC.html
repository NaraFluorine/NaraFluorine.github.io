          <h2 id="RPC的调用过程"><a href="#RPC的调用过程" class="headerlink" title="RPC的调用过程"></a>RPC的调用过程</h2><h2 id="protobuf"><a href="#protobuf" class="headerlink" title="protobuf"></a>protobuf</h2><p>编译proto<br><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">protoc --cpp_out=. addressbook.proto</span><br></pre></td></tr></table></figure></p>
<p>写proto<br><figure class="highlight proto"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line">syntax = <span class="string">&quot;proto2&quot;</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">package</span> tutorial;</span><br><span class="line"></span><br><span class="line"><span class="keyword">message </span><span class="title class_">Person</span> &#123;</span><br><span class="line">  <span class="keyword">required</span> <span class="type">string</span> name = <span class="number">1</span>;</span><br><span class="line">  <span class="keyword">required</span> <span class="type">int32</span> id = <span class="number">2</span>;</span><br><span class="line">  <span class="keyword">optional</span> <span class="type">string</span> email = <span class="number">3</span>;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">enum </span><span class="title class_">PhoneType</span> &#123;</span><br><span class="line">    MOBILE = <span class="number">0</span>;</span><br><span class="line">    HOME = <span class="number">1</span>;</span><br><span class="line">    WORK = <span class="number">2</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">message </span><span class="title class_">PhoneNumber</span> &#123;</span><br><span class="line">    <span class="keyword">required</span> <span class="type">string</span> number = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">optional</span> PhoneType type = <span class="number">2</span> [default = HOME];</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">repeated</span> PhoneNumber phones = <span class="number">4</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></p>
<p>使用proto<br><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;fstream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;string&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&quot;addressbook.pb.h&quot;</span> <span class="comment">// 引入生成的头文件</span></span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="comment">// 验证库版本（可选，但推荐）</span></span><br><span class="line">    GOOGLE_PROTOBUF_VERIFY_VERSION;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// --- 写入/序列化 ---</span></span><br><span class="line">    std::string serialized_data;</span><br><span class="line">    &#123;</span><br><span class="line">        tutorial::Person person;</span><br><span class="line">        person.<span class="built_in">set_name</span>(<span class="string">&quot;Leon&quot;</span>);</span><br><span class="line">        person.<span class="built_in">set_id</span>(<span class="number">1234</span>);</span><br><span class="line">        person.<span class="built_in">set_email</span>(<span class="string">&quot;leon@example.com&quot;</span>);</span><br><span class="line"></span><br><span class="line">        <span class="comment">// 添加一个重复字段 (repeated)</span></span><br><span class="line">        tutorial::Person_PhoneNumber* phone = person.<span class="built_in">add_phones</span>();</span><br><span class="line">        phone-&gt;<span class="built_in">set_number</span>(<span class="string">&quot;138-0000-0000&quot;</span>);</span><br><span class="line">        phone-&gt;<span class="built_in">set_type</span>(tutorial::Person_PhoneType_MOBILE);</span><br><span class="line"></span><br><span class="line">        <span class="comment">// 序列化成字符串</span></span><br><span class="line">        <span class="keyword">if</span> (!person.<span class="built_in">SerializeToString</span>(&amp;serialized_data)) &#123;</span><br><span class="line">            std::cerr &lt;&lt; <span class="string">&quot;序列化失败！&quot;</span> &lt;&lt; std::endl;</span><br><span class="line">            <span class="keyword">return</span> <span class="number">-1</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        std::cout &lt;&lt; <span class="string">&quot;数据已成功序列化。&quot;</span> &lt;&lt; std::endl;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// --- 读取/反序列化 ---</span></span><br><span class="line">    &#123;</span><br><span class="line">        tutorial::Person person;</span><br><span class="line">        <span class="keyword">if</span> (!person.<span class="built_in">ParseFromString</span>(serialized_data)) &#123;</span><br><span class="line">            std::cerr &lt;&lt; <span class="string">&quot;反序列化失败！&quot;</span> &lt;&lt; std::endl;</span><br><span class="line">            <span class="keyword">return</span> <span class="number">-1</span>;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        std::cout &lt;&lt; <span class="string">&quot;读取到姓名: &quot;</span> &lt;&lt; person.<span class="built_in">name</span>() &lt;&lt; std::endl;</span><br><span class="line">        std::cout &lt;&lt; <span class="string">&quot;读取到ID: &quot;</span> &lt;&lt; person.<span class="built_in">id</span>() &lt;&lt; std::endl;</span><br><span class="line">        <span class="keyword">if</span> (person.<span class="built_in">has_email</span>()) &#123;</span><br><span class="line">            std::cout &lt;&lt; <span class="string">&quot;读取到邮箱: &quot;</span> &lt;&lt; person.<span class="built_in">email</span>() &lt;&lt; std::endl;</span><br><span class="line">        &#125;</span><br><span class="line">        </span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; person.<span class="built_in">phones_size</span>(); ++i) &#123;</span><br><span class="line">            <span class="type">const</span> tutorial::Person_PhoneNumber&amp; phone = person.<span class="built_in">phones</span>(i);</span><br><span class="line">            std::cout &lt;&lt; <span class="string">&quot;电话 #&quot;</span> &lt;&lt; i + <span class="number">1</span> &lt;&lt; <span class="string">&quot;: &quot;</span> &lt;&lt; phone.<span class="built_in">number</span>() &lt;&lt; std::endl;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 清理内存</span></span><br><span class="line">    google::protobuf::<span class="built_in">ShutdownProtobufLibrary</span>();</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></p>
