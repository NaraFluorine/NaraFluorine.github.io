          <h2 id="user"><a href="#user" class="headerlink" title="user"></a>user</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line">斐波那契数多项式</span><br><span class="line"></span><br><span class="line">斐波那契数&#123;fn, n ≥ 0&#125;由递归式fn = fn-1 + fn-2给出，初值是f0 = 0和f1 = 1。</span><br><span class="line"></span><br><span class="line">定义多项式&#123;Fn, n ≥ 0&#125;为Fn(x) = ∑fixi，其中0 ≤ i ≤ n。</span><br><span class="line"></span><br><span class="line">例如，F7(x) = x + x2 + 2x3 + 3x4 + 5x5 + 8x6 + 13x7，而F7(11) = 268357683.</span><br><span class="line"></span><br><span class="line">取n = 10^&#123;15&#125;。求[∑_&#123;0≤x≤100&#125; Fn(x)] mod 1307674368000 (= 15!)。</span><br><span class="line"></span><br><span class="line">我的思路:矩阵快速幂.</span><br><span class="line"></span><br><span class="line">首先枚举x.</span><br><span class="line">记录F_y(x)的值,有</span><br><span class="line"></span><br><span class="line">F_(y)(x)=(x^2)F_(y-2)(x)+(x)F_(y-1)(x)+x</span><br><span class="line"></span><br><span class="line">那么直接维护即可.请给我c++代码</span><br></pre></td></tr></table></figure>
<h2 id="gpt"><a href="#gpt" class="headerlink" title="gpt"></a>gpt</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br></pre></td><td class="code"><pre><span class="line">你的思路是**完全正确的**，而且这个题目本质上就是：</span><br><span class="line"></span><br><span class="line">&gt; 对每个 (x\in[0,100])，用 **矩阵快速幂** 在 (O(\log n)) 时间内算出</span><br><span class="line">&gt; (F_n(x)=\sum_&#123;i=0&#125;^n f_i x^i)，</span><br><span class="line">&gt; 然后求和并取模。</span><br><span class="line"></span><br><span class="line">下面我先把递推关系**严格整理清楚**，再给你一份**可直接用的 C++ 实现**。</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 一、递推关系的推导（确认你写的式子）</span><br><span class="line"></span><br><span class="line">已知：</span><br><span class="line">[</span><br><span class="line">f_i = f_&#123;i-1&#125;+f_&#123;i-2&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">定义：</span><br><span class="line">[</span><br><span class="line">F_n(x)=\sum_&#123;i=0&#125;^n f_i x^i</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">我们有：</span><br><span class="line">[</span><br><span class="line">\begin&#123;aligned&#125;</span><br><span class="line">F_n(x)</span><br><span class="line">&amp;= F_&#123;n-1&#125;(x) + f_n x^n \</span><br><span class="line">&amp;= F_&#123;n-1&#125;(x) + (f_&#123;n-1&#125;+f_&#123;n-2&#125;)x^n \</span><br><span class="line">&amp;= F_&#123;n-1&#125;(x) + x\cdot f_&#123;n-1&#125;x^&#123;n-1&#125; + x^2\cdot f_&#123;n-2&#125;x^&#123;n-2&#125;</span><br><span class="line">\end&#123;aligned&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">注意到：</span><br><span class="line">[</span><br><span class="line">\begin&#123;aligned&#125;</span><br><span class="line">f_&#123;n-1&#125;x^&#123;n-1&#125; &amp;= F_&#123;n-1&#125;(x)-F_&#123;n-2&#125;(x) \</span><br><span class="line">f_&#123;n-2&#125;x^&#123;n-2&#125; &amp;= F_&#123;n-2&#125;(x)-F_&#123;n-3&#125;(x)</span><br><span class="line">\end&#123;aligned&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">整理后可得一个**二阶非齐次线性递推**：</span><br><span class="line">[</span><br><span class="line">\boxed&#123;</span><br><span class="line">F_n(x) = x F_&#123;n-1&#125;(x) + x^2 F_&#123;n-2&#125;(x) + x</span><br><span class="line">&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">与你写的是一致的 ✅</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 二、矩阵形式</span><br><span class="line"></span><br><span class="line">设状态向量：</span><br><span class="line">[</span><br><span class="line">\mathbf&#123;v&#125;*n=</span><br><span class="line">\begin&#123;bmatrix&#125;</span><br><span class="line">F_n(x)\</span><br><span class="line">F*&#123;n-1&#125;(x)\</span><br><span class="line">1</span><br><span class="line">\end&#123;bmatrix&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">则：</span><br><span class="line">[</span><br><span class="line">\mathbf&#123;v&#125;*n =</span><br><span class="line">\begin&#123;bmatrix&#125;</span><br><span class="line">x &amp; x^2 &amp; x \</span><br><span class="line">1 &amp; 0   &amp; 0 \</span><br><span class="line">0 &amp; 0   &amp; 1</span><br><span class="line">\end&#123;bmatrix&#125;</span><br><span class="line">\mathbf&#123;v&#125;*&#123;n-1&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">初值：</span><br><span class="line">[</span><br><span class="line">F_0(x)=0,\quad F_1(x)=x</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">所以：</span><br><span class="line">[</span><br><span class="line">\mathbf&#123;v&#125;_1=</span><br><span class="line">\begin&#123;bmatrix&#125;</span><br><span class="line">x\</span><br><span class="line">0\</span><br><span class="line">1</span><br><span class="line">\end&#123;bmatrix&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">我们要算：</span><br><span class="line">[</span><br><span class="line">\mathbf&#123;v&#125;_n = M^&#123;,n-1&#125;\mathbf&#123;v&#125;_1</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 三、整体复杂度</span><br><span class="line"></span><br><span class="line">* (x = 0\sim100)，共 **101 次**</span><br><span class="line">* 每次 3×3 矩阵快速幂：(O(\log n))</span><br><span class="line">* 总复杂度：</span><br><span class="line">  [</span><br><span class="line">  O(101\cdot 3^3\log n) \quad\text&#123;极其轻松&#125;</span><br><span class="line">  ]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 四、完整 C++ 实现（可直接交）</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="type">static</span> <span class="type">const</span> <span class="type">long</span> <span class="type">long</span> MOD = <span class="number">1307674368000LL</span>; <span class="comment">// 15!</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">struct</span> <span class="title class_">Mat</span> &#123;</span><br><span class="line">    <span class="type">long</span> <span class="type">long</span> a[<span class="number">3</span>][<span class="number">3</span>];</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="function">Mat <span class="title">mul</span><span class="params">(<span class="type">const</span> Mat &amp;A, <span class="type">const</span> Mat &amp;B)</span> </span>&#123;</span><br><span class="line">    Mat C&#123;&#125;;</span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; <span class="number">3</span>; i++) &#123;</span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> k = <span class="number">0</span>; k &lt; <span class="number">3</span>; k++) &#123;</span><br><span class="line">            <span class="keyword">if</span> (A.a[i][k] == <span class="number">0</span>) <span class="keyword">continue</span>;</span><br><span class="line">            <span class="keyword">for</span> (<span class="type">int</span> j = <span class="number">0</span>; j &lt; <span class="number">3</span>; j++) &#123;</span><br><span class="line">                __int128 tmp = (__int128)A.a[i][k] * B.a[k][j];</span><br><span class="line">                C.a[i][j] = (C.a[i][j] + tmp) % MOD;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> C;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function">Mat <span class="title">mpow</span><span class="params">(Mat base, <span class="type">long</span> <span class="type">long</span> exp)</span> </span>&#123;</span><br><span class="line">    Mat res&#123;&#125;;</span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; <span class="number">3</span>; i++) res.a[i][i] = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">while</span> (exp &gt; <span class="number">0</span>) &#123;</span><br><span class="line">        <span class="keyword">if</span> (exp &amp; <span class="number">1</span>) res = <span class="built_in">mul</span>(res, base);</span><br><span class="line">        base = <span class="built_in">mul</span>(base, base);</span><br><span class="line">        exp &gt;&gt;= <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> res;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">long</span> <span class="type">long</span> <span class="title">calc_Fn</span><span class="params">(<span class="type">long</span> <span class="type">long</span> n, <span class="type">long</span> <span class="type">long</span> x)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (n == <span class="number">0</span>) <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">if</span> (n == <span class="number">1</span>) <span class="keyword">return</span> x % MOD;</span><br><span class="line"></span><br><span class="line">    Mat M&#123;&#125;;</span><br><span class="line">    M.a[<span class="number">0</span>][<span class="number">0</span>] = x % MOD;</span><br><span class="line">    M.a[<span class="number">0</span>][<span class="number">1</span>] = (x * x) % MOD;</span><br><span class="line">    M.a[<span class="number">0</span>][<span class="number">2</span>] = x % MOD;</span><br><span class="line">    M.a[<span class="number">1</span>][<span class="number">0</span>] = <span class="number">1</span>;</span><br><span class="line">    M.a[<span class="number">2</span>][<span class="number">2</span>] = <span class="number">1</span>;</span><br><span class="line"></span><br><span class="line">    Mat P = <span class="built_in">mpow</span>(M, n - <span class="number">1</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// v1 = [F1, F0, 1]^T = [x, 0, 1]</span></span><br><span class="line">    <span class="type">long</span> <span class="type">long</span> Fn =</span><br><span class="line">        ( (__int128)P.a[<span class="number">0</span>][<span class="number">0</span>] * x</span><br><span class="line">        + (__int128)P.a[<span class="number">0</span>][<span class="number">2</span>] * <span class="number">1</span> ) % MOD;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> Fn;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    ios::<span class="built_in">sync_with_stdio</span>(<span class="literal">false</span>);</span><br><span class="line">    cin.<span class="built_in">tie</span>(<span class="literal">nullptr</span>);</span><br><span class="line"></span><br><span class="line">    <span class="type">const</span> <span class="type">long</span> <span class="type">long</span> n = <span class="number">1000000000000000LL</span>; <span class="comment">// 10^15</span></span><br><span class="line">    <span class="type">long</span> <span class="type">long</span> ans = <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> x = <span class="number">0</span>; x &lt;= <span class="number">100</span>; x++) &#123;</span><br><span class="line">        ans = (ans + <span class="built_in">calc_Fn</span>(n, x)) % MOD;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    cout &lt;&lt; ans &lt;&lt; <span class="string">&quot;\n&quot;</span>;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line"></span><br><span class="line">## 五、几点关键说明（非常重要）</span><br><span class="line"></span><br><span class="line">1. **一定要用 `__int128`**</span><br><span class="line">   因为中间乘法最大约：</span><br><span class="line">   [</span><br><span class="line">   (15!)^2 \approx 10^&#123;24&#125;</span><br><span class="line">   ]</span><br><span class="line"></span><br><span class="line">2. **模数不是质数**</span><br><span class="line">   所以不能用任何逆元或除法，只能老老实实矩阵乘。</span><br><span class="line"></span><br><span class="line">3. **x = 0 也能正常处理**</span><br><span class="line">   矩阵自然退化，代码不需要特判。</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">如果你愿意，下一步我可以帮你：</span><br><span class="line"></span><br><span class="line">* 把 3×3 压缩成 2×2（更优雅）</span><br><span class="line">* 给出数学上的生成函数解法</span><br><span class="line">* 或直接证明这个递推为什么一定成立</span><br><span class="line"></span><br><span class="line">这道题本身是**竞赛级 + 数论味道很浓**的好题 👍</span><br><span class="line"></span><br></pre></td></tr></table></figure>
