          <h2 id="user"><a href="#user" class="headerlink" title="user"></a>user</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">数字和为质数</span><br><span class="line">记D(n)为第n个各位数字和为质数的正整数。</span><br><span class="line">例如，D(61) = 157，D(10^8) = 403539364。</span><br><span class="line"></span><br><span class="line">求D(10^&#123;16&#125;)。</span><br><span class="line"></span><br><span class="line">我的思路:二分.</span><br><span class="line">首先发现数字再大,数字各位和是极其有限的.</span><br><span class="line">所以二分答案,对于这个答案计算&lt;每个质数在答案范围内得到数字的贡献&gt;,可以使用数位dp.</span><br><span class="line"></span><br><span class="line">这是一个很麻烦的dp,首先不能有前导0,其次是枚举的数字和必须是枚举的质数,最后是枚举的数字要小于答案.</span><br><span class="line"></span><br><span class="line">请给我c++代码实现,记得开int128,讲清楚数位dp部分是怎么写的(我不擅长数位dp)</span><br><span class="line"></span><br></pre></td></tr></table></figure>
<h2 id="gpt"><a href="#gpt" class="headerlink" title="gpt"></a>gpt</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br></pre></td><td class="code"><pre><span class="line">这是一个**典型但非常“硬”的数位 DP + 二分答案问题**，你的总体思路是**完全正确的**，而且已经站在“可解”的那一侧了 👍</span><br><span class="line">下面我会：</span><br><span class="line"></span><br><span class="line">1. **先把整体解法逻辑彻底理清**</span><br><span class="line">2. **一步一步讲清楚数位 DP 怎么设计（不跳步，尽量白话）**</span><br><span class="line">3. **给出一份完整、可直接跑的 C++（含 `__int128`）实现**</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 一、问题重新表述（方便统一语言）</span><br><span class="line"></span><br><span class="line">* 定义：</span><br><span class="line">  ( D(n) ) = 第 ( n ) 个 **各位数字和为质数** 的正整数（按从小到大排序）</span><br><span class="line"></span><br><span class="line">* 要求：</span><br><span class="line">  求</span><br><span class="line">  [</span><br><span class="line">  D(10^&#123;16&#125;)</span><br><span class="line">  ]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 二、整体解法（你思路的“标准版”）</span><br><span class="line"></span><br><span class="line">### 1️⃣ 单调性 → 可以二分</span><br><span class="line"></span><br><span class="line">定义函数：</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">f(x) = #&#123; 1 \le k \le x \mid \text&#123;digit_sum&#125;(k) \text&#123; 是质数&#125; &#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">显然：</span><br><span class="line"></span><br><span class="line">* ( f(x) ) 单调不减</span><br><span class="line">* 我们要找最小的 ( x )，使得</span><br><span class="line">  [</span><br><span class="line">  f(x) \ge 10^&#123;16&#125;</span><br><span class="line">  ]</span><br><span class="line"></span><br><span class="line">➡ **标准二分答案**</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">### 2️⃣ 核心难点：如何算 ( f(x) )</span><br><span class="line"></span><br><span class="line">这就是你说的那句：</span><br><span class="line"></span><br><span class="line">&gt; “对于这个答案计算 `&lt;每个质数在答案范围内得到数字的贡献&gt;`，可以使用数位 dp”</span><br><span class="line"></span><br><span class="line">完全正确 ✔</span><br><span class="line">我们要做的就是：</span><br><span class="line"></span><br><span class="line">&gt; **数位 DP：统计 ≤ x 的数中，数字和 = p（p 为质数）的个数**</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 三、数位 DP 设计（重点讲解）</span><br><span class="line"></span><br><span class="line">### 1️⃣ 状态设计</span><br><span class="line"></span><br><span class="line">我们把 ( x ) 转成字符串 `s`，长度为 `len`</span><br><span class="line"></span><br><span class="line">定义 DP 状态：</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">dp[pos][sum][tight][started]</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br></pre></td><td class="code"><pre><span class="line">含义：</span><br><span class="line"></span><br><span class="line">| 维度        | 含义                    |</span><br><span class="line">| --------- | --------------------- |</span><br><span class="line">| `pos`     | 当前处理到第 pos 位（0-based） |</span><br><span class="line">| `sum`     | 当前已累积的各位数字和           |</span><br><span class="line">| `tight`   | 前缀是否仍与 x 相同（是否被上界限制）  |</span><br><span class="line">| `started` | 是否已经开始构造数字（避免前导 0）    |</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">### 2️⃣ 为什么一定要 `started`</span><br><span class="line"></span><br><span class="line">举例：</span><br><span class="line">数字 `000123` 在数位 DP 中：</span><br><span class="line"></span><br><span class="line">* 前面的 0 **不能计入数字和**</span><br><span class="line">* 否则 `123` 会被算成 `0+0+0+1+2+3`</span><br><span class="line"></span><br><span class="line">👉 `started = false` 表示：</span><br><span class="line"></span><br><span class="line">&gt; 目前还没遇到第一个非零数字</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">### 3️⃣ 转移逻辑（逐行解释）</span><br><span class="line"></span><br><span class="line">假设当前在 `pos`</span><br><span class="line"></span><br><span class="line">我们枚举当前位的数字 `d`：</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="type">int</span> up = tight ? s[pos] - <span class="string">&#x27;0&#x27;</span> : <span class="number">9</span>;</span><br><span class="line"><span class="keyword">for</span> (<span class="type">int</span> d = <span class="number">0</span>; d &lt;= up; d++) &#123;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">#### 更新状态：</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">new_tight = tight &amp;&amp; (d == up)</span><br><span class="line">new_started = started || (d != <span class="number">0</span>)</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">#### 更新数字和：</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">new_sum = sum + (new_started ? d : <span class="number">0</span>)</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">&gt; 如果还没 started（前导 0），digit sum 不变</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">### 4️⃣ 终止条件（pos == len）</span><br><span class="line"></span><br><span class="line">当所有位都处理完：</span><br><span class="line"></span><br><span class="line">* 必须 `started == true`（不能是 0）</span><br><span class="line">* `sum` 必须是 **质数**</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">if</span> (started &amp;&amp; isPrime[sum]) <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line"><span class="keyword">else</span> <span class="keyword">return</span> <span class="number">0</span>;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line"></span><br><span class="line">### 5️⃣ 数字和的上界（非常重要）</span><br><span class="line"></span><br><span class="line">* 最大 18 位</span><br><span class="line">* 每位最大 9</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">\text&#123;max sum&#125; = 18 \times 9 = 162</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">➡ 我们只需筛 **0～162 的质数**</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 四、完整 C++ 实现（含 `__int128`）</span><br><span class="line"></span><br><span class="line">### ✅ 特点</span><br><span class="line"></span><br><span class="line">* 支持 `10^16` 级别二分</span><br><span class="line">* 使用 `__int128` 防止溢出</span><br><span class="line">* 数位 DP + 记忆化</span><br><span class="line">* 清晰、可复用</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">### 📌 完整代码</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="keyword">using</span> i128 = <span class="type">__int128_t</span>;</span><br><span class="line"><span class="keyword">using</span> u128 = <span class="type">__uint128_t</span>;</span><br><span class="line"></span><br><span class="line">string s;</span><br><span class="line">i128 dp[<span class="number">20</span>][<span class="number">170</span>][<span class="number">2</span>][<span class="number">2</span>];</span><br><span class="line"><span class="type">bool</span> vis[<span class="number">20</span>][<span class="number">170</span>][<span class="number">2</span>][<span class="number">2</span>];</span><br><span class="line"><span class="type">bool</span> isPrime[<span class="number">170</span>];</span><br><span class="line"></span><br><span class="line"><span class="type">int</span> len;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 数位 DP</span></span><br><span class="line"><span class="function">i128 <span class="title">dfs</span><span class="params">(<span class="type">int</span> pos, <span class="type">int</span> sum, <span class="type">bool</span> tight, <span class="type">bool</span> started)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (pos == len) &#123;</span><br><span class="line">        <span class="keyword">if</span> (started &amp;&amp; isPrime[sum]) <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">        <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">if</span> (vis[pos][sum][tight][started])</span><br><span class="line">        <span class="keyword">return</span> dp[pos][sum][tight][started];</span><br><span class="line"></span><br><span class="line">    vis[pos][sum][tight][started] = <span class="literal">true</span>;</span><br><span class="line">    i128 &amp;res = dp[pos][sum][tight][started];</span><br><span class="line">    res = <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">    <span class="type">int</span> up = tight ? (s[pos] - <span class="string">&#x27;0&#x27;</span>) : <span class="number">9</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> d = <span class="number">0</span>; d &lt;= up; d++) &#123;</span><br><span class="line">        <span class="type">bool</span> n_started = started || (d != <span class="number">0</span>);</span><br><span class="line">        <span class="type">int</span> n_sum = sum + (n_started ? d : <span class="number">0</span>);</span><br><span class="line">        <span class="type">bool</span> n_tight = tight &amp;&amp; (d == up);</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (n_sum &lt;= <span class="number">162</span>)</span><br><span class="line">            res += <span class="built_in">dfs</span>(pos + <span class="number">1</span>, n_sum, n_tight, n_started);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> res;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 计算 f(x)</span></span><br><span class="line"><span class="function">i128 <span class="title">count_good</span><span class="params">(i128 x)</span> </span>&#123;</span><br><span class="line">    s.<span class="built_in">clear</span>();</span><br><span class="line">    <span class="keyword">while</span> (x &gt; <span class="number">0</span>) &#123;</span><br><span class="line">        s.<span class="built_in">push_back</span>(<span class="string">&#x27;0&#x27;</span> + (<span class="type">int</span>)(x % <span class="number">10</span>));</span><br><span class="line">        x /= <span class="number">10</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">if</span> (s.<span class="built_in">empty</span>()) s = <span class="string">&quot;0&quot;</span>;</span><br><span class="line">    <span class="built_in">reverse</span>(s.<span class="built_in">begin</span>(), s.<span class="built_in">end</span>());</span><br><span class="line">    len = s.<span class="built_in">size</span>();</span><br><span class="line"></span><br><span class="line">    <span class="built_in">memset</span>(vis, <span class="number">0</span>, <span class="built_in">sizeof</span>(vis));</span><br><span class="line">    <span class="keyword">return</span> <span class="built_in">dfs</span>(<span class="number">0</span>, <span class="number">0</span>, <span class="number">1</span>, <span class="number">0</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="comment">// 筛质数（0～162）</span></span><br><span class="line">    <span class="built_in">memset</span>(isPrime, <span class="literal">true</span>, <span class="built_in">sizeof</span>(isPrime));</span><br><span class="line">    isPrime[<span class="number">0</span>] = isPrime[<span class="number">1</span>] = <span class="literal">false</span>;</span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">2</span>; i * i &lt;= <span class="number">162</span>; i++)</span><br><span class="line">        <span class="keyword">if</span> (isPrime[i])</span><br><span class="line">            <span class="keyword">for</span> (<span class="type">int</span> j = i * i; j &lt;= <span class="number">162</span>; j += i)</span><br><span class="line">                isPrime[j] = <span class="literal">false</span>;</span><br><span class="line"></span><br><span class="line">    i128 target = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; <span class="number">16</span>; i++) target *= <span class="number">10</span>; <span class="comment">// 10^16</span></span><br><span class="line"></span><br><span class="line">    i128 L = <span class="number">1</span>, R = (i128)<span class="number">1e18</span>;</span><br><span class="line">    <span class="keyword">while</span> (L &lt; R) &#123;</span><br><span class="line">        i128 mid = (L + R) &gt;&gt; <span class="number">1</span>;</span><br><span class="line">        <span class="keyword">if</span> (<span class="built_in">count_good</span>(mid) &gt;= target)</span><br><span class="line">            R = mid;</span><br><span class="line">        <span class="keyword">else</span></span><br><span class="line">            L = mid + <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 输出 __int128</span></span><br><span class="line">    string out;</span><br><span class="line">    i128 ans = L;</span><br><span class="line">    <span class="keyword">while</span> (ans &gt; <span class="number">0</span>) &#123;</span><br><span class="line">        out.<span class="built_in">push_back</span>(<span class="string">&#x27;0&#x27;</span> + (<span class="type">int</span>)(ans % <span class="number">10</span>));</span><br><span class="line">        ans /= <span class="number">10</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">reverse</span>(out.<span class="built_in">begin</span>(), out.<span class="built_in">end</span>());</span><br><span class="line">    cout &lt;&lt; out &lt;&lt; <span class="string">&quot;\n&quot;</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line"></span><br><span class="line">## 五、复杂度 &amp; 可行性</span><br><span class="line"></span><br><span class="line">* 数位 DP 状态数：</span><br><span class="line">  [</span><br><span class="line">  20 \times 163 \times 2 \times 2 \approx 13,000</span><br><span class="line">  ]</span><br><span class="line"></span><br><span class="line">* 每次 `count_good(x)`：**极快**</span><br><span class="line"></span><br><span class="line">* 二分次数：≈ 60 次</span><br><span class="line"></span><br><span class="line">➡ **完全可在 1 秒内跑完**</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 六、总结一句话</span><br><span class="line"></span><br><span class="line">&gt; 这是一个**“二分 + 数位 DP 统计”的经典高阶问题**，你原本的思路已经非常接近标准解，只差把数位 DP 的状态和转移理顺。</span><br><span class="line"></span><br><span class="line">如果你愿意，下一步我可以帮你：</span><br><span class="line"></span><br><span class="line">* 把 `started` 的逻辑**进一步简化**</span><br><span class="line">* 或者改写成 **“枚举质数 → 每个质数单独 DP”** 的版本</span><br><span class="line">* 或教你一个**数位 DP 的通用模板心法**，以后见到就能直接套</span><br><span class="line"></span><br><span class="line">随时说 👍</span><br><span class="line"></span><br></pre></td></tr></table></figure>
