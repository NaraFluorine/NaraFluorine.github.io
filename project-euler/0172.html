          <h2 id="user"><a href="#user" class="headerlink" title="user"></a>user</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">关于有少量重复数字的数的研究</span><br><span class="line"></span><br><span class="line">有多少个18位数n（不考虑前导零）满足在n中没有一个数字出现超过三次？</span><br><span class="line"></span><br><span class="line">我的思路:枚举每个数字的出现次数,直到填满18位.</span><br><span class="line"></span><br><span class="line">然后计算组合数:因为不能有前导0,所以要特别判断:如果0不出现没事,如果出现要减掉0开头的数字.</span><br><span class="line">请给我c++代码实现,预处理组合数,使用int128.</span><br></pre></td></tr></table></figure>
<h2 id="gpt"><a href="#gpt" class="headerlink" title="gpt"></a>gpt</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br></pre></td><td class="code"><pre><span class="line">你的思路是**完全正确的**：</span><br><span class="line">本质是对「每个数字出现次数 ≤ 3，且总位数 = 18」的**多重集排列计数**，再用**容斥（扣掉前导 0）**即可。</span><br><span class="line"></span><br><span class="line">下面我先把数学逻辑简要梳理清楚，然后给你一份**可直接编译运行的 C++（使用 `__int128`，预处理组合数/阶乘）**。</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 数学建模（与你思路一致）</span><br><span class="line"></span><br><span class="line">设</span><br><span class="line">[</span><br><span class="line">c_0, c_1, \dots, c_9 \in &#123;0,1,2,3&#125;, \quad \sum_&#123;d=0&#125;^9 c_d = 18</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">### 1️⃣ 不考虑前导 0 的排列数</span><br><span class="line"></span><br><span class="line">对固定的计数方案 ((c_0,\dots,c_9))，排列数是多项式系数：</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">\text&#123;all&#125; = \frac&#123;18!&#125;&#123;\prod_&#123;d=0&#125;^9 c_d!&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">### 2️⃣ 扣除前导 0（若 (c_0 \ge 1)）</span><br><span class="line"></span><br><span class="line">固定第一位为 0，剩余 17 位排列：</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">\text&#123;bad&#125; = \frac&#123;17!&#125;&#123;(c_0-1)! \prod_&#123;d=1&#125;^9 c_d!&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">### 3️⃣ 合法数量</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">\text&#123;valid&#125; =</span><br><span class="line">\begin&#123;cases&#125;</span><br><span class="line">\text&#123;all&#125;, &amp; c_0 = 0 \</span><br><span class="line">\text&#123;all&#125; - \text&#123;bad&#125;, &amp; c_0 \ge 1</span><br><span class="line">\end&#123;cases&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 实现要点</span><br><span class="line"></span><br><span class="line">* 枚举 10 个数字，每个取值 `0..3`</span><br><span class="line">* DFS / 递归枚举，剪枝 `sum &gt; 18`</span><br><span class="line">* 预处理 `0..18` 的阶乘（`__int128`）</span><br><span class="line">* 累加答案</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## C++ 实现（使用 `__int128`）</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="keyword">using</span> i128 = <span class="type">__int128_t</span>;</span><br><span class="line"></span><br><span class="line">i128 fact[<span class="number">20</span>];</span><br><span class="line">i128 ans = <span class="number">0</span>;</span><br><span class="line"><span class="type">int</span> c[<span class="number">10</span>];</span><br><span class="line"></span><br><span class="line"><span class="comment">// 打印 __int128（调试用，可选）</span></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">print_i128</span><span class="params">(i128 x)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (x == <span class="number">0</span>) &#123;</span><br><span class="line">        cout &lt;&lt; <span class="number">0</span>;</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">if</span> (x &lt; <span class="number">0</span>) &#123;</span><br><span class="line">        cout &lt;&lt; <span class="string">&#x27;-&#x27;</span>;</span><br><span class="line">        x = -x;</span><br><span class="line">    &#125;</span><br><span class="line">    string s;</span><br><span class="line">    <span class="keyword">while</span> (x) &#123;</span><br><span class="line">        s.<span class="built_in">push_back</span>(<span class="string">&#x27;0&#x27;</span> + x % <span class="number">10</span>);</span><br><span class="line">        x /= <span class="number">10</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">reverse</span>(s.<span class="built_in">begin</span>(), s.<span class="built_in">end</span>());</span><br><span class="line">    cout &lt;&lt; s;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">dfs</span><span class="params">(<span class="type">int</span> d, <span class="type">int</span> sum)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (sum &gt; <span class="number">18</span>) <span class="keyword">return</span>;</span><br><span class="line">    <span class="keyword">if</span> (d == <span class="number">10</span>) &#123;</span><br><span class="line">        <span class="keyword">if</span> (sum != <span class="number">18</span>) <span class="keyword">return</span>;</span><br><span class="line"></span><br><span class="line">        <span class="comment">// all = 18! / prod(c[d]!)</span></span><br><span class="line">        i128 all = fact[<span class="number">18</span>];</span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">0</span>; i &lt; <span class="number">10</span>; i++)</span><br><span class="line">            all /= fact[c[i]];</span><br><span class="line"></span><br><span class="line">        <span class="comment">// subtract leading-zero cases if needed</span></span><br><span class="line">        <span class="keyword">if</span> (c[<span class="number">0</span>] &gt; <span class="number">0</span>) &#123;</span><br><span class="line">            i128 bad = fact[<span class="number">17</span>];</span><br><span class="line">            bad /= fact[c[<span class="number">0</span>] - <span class="number">1</span>];</span><br><span class="line">            <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">1</span>; i &lt; <span class="number">10</span>; i++)</span><br><span class="line">                bad /= fact[c[i]];</span><br><span class="line">            all -= bad;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        ans += all;</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> k = <span class="number">0</span>; k &lt;= <span class="number">3</span>; k++) &#123;</span><br><span class="line">        c[d] = k;</span><br><span class="line">        <span class="built_in">dfs</span>(d + <span class="number">1</span>, sum + k);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="comment">// factorial</span></span><br><span class="line">    fact[<span class="number">0</span>] = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">1</span>; i &lt;= <span class="number">18</span>; i++)</span><br><span class="line">        fact[i] = fact[i - <span class="number">1</span>] * i;</span><br><span class="line"></span><br><span class="line">    <span class="built_in">dfs</span>(<span class="number">0</span>, <span class="number">0</span>);</span><br><span class="line"></span><br><span class="line">    <span class="built_in">print_i128</span>(ans);</span><br><span class="line">    cout &lt;&lt; <span class="string">&quot;\n&quot;</span>;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line"></span><br><span class="line">## 复杂度分析</span><br><span class="line"></span><br><span class="line">* 枚举状态数：</span><br><span class="line">  [</span><br><span class="line">  4^&#123;10&#125; = 1,048,576</span><br><span class="line">  ]</span><br><span class="line">* 实际有效状态远少于此（受 `sum=18` 约束）</span><br><span class="line">* 每个状态仅常数运算，**秒级内必跑完**</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 拓展（你可能会感兴趣）</span><br><span class="line"></span><br><span class="line">* 改成「最多出现 k 次」 → 把 `3` 改成参数</span><br><span class="line">* 改成「恰好有 m 个数字出现 3 次」</span><br><span class="line">* 推广到 n 位数 / b 进制</span><br><span class="line">* 用生成函数</span><br><span class="line">  [</span><br><span class="line">  (1+x+x^2+x^3)^&#123;10&#125;</span><br><span class="line">  ]</span><br><span class="line"></span><br><span class="line">如果你愿意，我可以帮你：</span><br><span class="line"></span><br><span class="line">* 用 **组合数 DP** 再写一版</span><br><span class="line">* 给出 **数学闭式表达**</span><br><span class="line">* 或验证结果数量级是否合理</span><br><span class="line"></span><br><span class="line">你这个问题本身就已经是**竞赛 / 数论研究级别**了 👍</span><br><span class="line"></span><br></pre></td></tr></table></figure>
