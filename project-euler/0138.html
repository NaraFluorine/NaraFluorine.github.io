          <h2 id="user"><a href="#user" class="headerlink" title="user"></a>user</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><span class="line">特殊等腰三角形</span><br><span class="line"></span><br><span class="line">考虑底为b = 16，腰为L = 17的等腰三角形。</span><br><span class="line"></span><br><span class="line">使用毕达哥拉斯定理，我们可以求出三角形的高是h = √(172 − 82) = 15，恰好比底长小1。</span><br><span class="line"></span><br><span class="line">当b = 272而L = 305时，可以算出h = 273，恰好比底长大1，而且这是满足性质h = b ± 1的三角形中第二小的。</span><br><span class="line"></span><br><span class="line">对于最小的12个满足h = b ± 1且b，L均为正整数的等腰三角形，求∑ L。</span><br><span class="line"></span><br><span class="line">我的思路:</span><br><span class="line">首先,腰长是整数,高度也是整数,所以半个底边长也必须是整数.</span><br><span class="line">所以底边长一定能被2整除.设半个底边长x.</span><br><span class="line">第一种情况:高度h=2x+1</span><br><span class="line">那么L^2=4xx+1+4x+xx=5x^2+4x+1</span><br><span class="line">是一个佩尔方程,直接解就行.</span><br><span class="line"></span><br><span class="line">第二种情况:高度h=2x-1,仍然是一个pell方程,直接解就可以了,最后对12个解排序即可,</span><br><span class="line">请给我c++代码,注意用int128</span><br><span class="line">参考pell方程实现:</span><br><span class="line">pair&lt;__int128,__int128&gt; pell(__int128* dat,__int128 d,__int128 k=1)&#123;/* x^2 -d y^2 =1 求解 */</span><br><span class="line">	long double sq=sqrt(d);/*    辅助内存     求解d     答案k次方*/</span><br><span class="line">	__int128 ss=sq,m=-1,upper=1,lower=0;</span><br><span class="line">	if(ss*ss==d)return &#123;-1,-1&#125;;/*无解*/</span><br><span class="line">	dat[++m]=sq;</span><br><span class="line">	__int128 a=ss,b=1;</span><br><span class="line">	do&#123;</span><br><span class="line">		b=(d-a*a)/b;</span><br><span class="line">		dat[++m]=(sq+a)/b;</span><br><span class="line">		a=dat[m]*b-a;</span><br><span class="line">	&#125;while((dat[0]&lt;&lt;1)!=dat[m]);</span><br><span class="line">	for(int i=m-1;i&gt;=0;--i)&#123;</span><br><span class="line">		swap(upper,lower);</span><br><span class="line">		upper+=dat[i]*lower;</span><br><span class="line">	&#125;</span><br><span class="line">	pair&lt;__int128,__int128&gt; res;</span><br><span class="line">	if(m&amp;1)res=&#123;upper*upper&lt;&lt;1|1,upper*lower&lt;&lt;1&#125;;</span><br><span class="line">	//求 x^2+dy^2=-1把if else改成res=&#123;upper,lower&#125;;</span><br><span class="line">	else res=&#123;upper,lower&#125;;</span><br><span class="line">	k--;</span><br><span class="line">	__int128 base[5]=&#123;0,res.first,d*res.second,res.second,res.first&#125;,rres[5]&#123;0,1,0,0,1&#125;;</span><br><span class="line">	while(k)&#123;</span><br><span class="line">		if(k&amp;1)tie(rres[1],rres[2],rres[3],rres[4])=make_tuple(rres[1]*base[1]+rres[2]*base[3],rres[1]*base[2]+rres[2]*base[4],rres[3]*base[1]+rres[4]*base[3],rres[3]*base[2]+rres[4]*base[4]);</span><br><span class="line">			   tie(base[1],base[2],base[3],base[4])=make_tuple(base[1]*base[1]+base[2]*base[3],base[1]*base[2]+base[2]*base[4],base[3]*base[1]+base[4]*base[3],base[3]*base[2]+base[4]*base[4]);</span><br><span class="line">		k&gt;&gt;=1;</span><br><span class="line">	&#125;</span><br><span class="line">	return &#123;rres[1]*res.first+rres[2]*res.second,rres[3]*res.first+rres[4]*res.second&#125;;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<h2 id="gpt"><a href="#gpt" class="headerlink" title="gpt"></a>gpt</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br></pre></td><td class="code"><pre><span class="line">你的思路是**完全正确的**，而且已经非常接近 Project Euler #138 / #139 这一类经典问题了 👍</span><br><span class="line">这里我帮你把**数学关系再整理一下**，然后给出一份**可直接跑、只用 `__int128` 的 C++ 实现**，不需要你给的那份偏复杂的 Pell 模板（但思想是一致的）。</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 一、数学整理（把 Pell 方程“标准化”）</span><br><span class="line"></span><br><span class="line">设底边为 `b = 2x`，腰为 `L`，高为 `h`。</span><br><span class="line"></span><br><span class="line">### 1️⃣ 情况一：`h = b + 1 = 2x + 1`</span><br><span class="line"></span><br><span class="line">由勾股定理：</span><br><span class="line">[</span><br><span class="line">L^2 = x^2 + (2x+1)^2 = 5x^2 + 4x + 1</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">令</span><br><span class="line">[</span><br><span class="line">y = 5x + 2</span><br><span class="line">]</span><br><span class="line">则：</span><br><span class="line">[</span><br><span class="line">y^2 - 5L^2 = -1</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">这是一个**标准 Pell 型方程**：</span><br><span class="line">[</span><br><span class="line">y^2 - 5L^2 = -1</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">### 2️⃣ 情况二：`h = b - 1 = 2x - 1`</span><br><span class="line"></span><br><span class="line">同理：</span><br><span class="line">[</span><br><span class="line">L^2 = x^2 + (2x-1)^2 = 5x^2 - 4x + 1</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">令</span><br><span class="line">[</span><br><span class="line">y = 5x - 2</span><br><span class="line">]</span><br><span class="line">仍然得到：</span><br><span class="line">[</span><br><span class="line">y^2 - 5L^2 = -1</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">👉 **结论非常漂亮：**</span><br><span class="line"></span><br><span class="line">&gt; 两种情况 **统一归结为**</span><br><span class="line">&gt; [</span><br><span class="line">&gt; y^2 - 5L^2 = -1</span><br><span class="line">&gt; ]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 二、解的生成规律（递推）</span><br><span class="line"></span><br><span class="line">方程：</span><br><span class="line">[</span><br><span class="line">y^2 - 5L^2 = -1</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">其最小正解是：</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">y = 2, L = 1</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">基本单位解（来自 x² − 5y² = 1）：</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">(9 + 4√5)</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">递推公式为：</span><br><span class="line"></span><br><span class="line">```text</span><br><span class="line">y_&#123;n+1&#125; = 9*y_n + 20*L_n</span><br><span class="line">L_&#123;n+1&#125; = 4*y_n + 9*L_n</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line"></span><br><span class="line">## 三、筛选合法三角形</span><br><span class="line"></span><br><span class="line">我们要的不是所有解，而是满足：</span><br><span class="line"></span><br><span class="line">* `y ≡ ±2 (mod 5)`</span><br><span class="line">* 对应 `x = (y ± 2) / 5` 为正整数</span><br><span class="line"></span><br><span class="line">并且计算：</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">b = 2x</span><br><span class="line">h = b ± 1</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line"></span><br><span class="line">## 四、C++ 实现（使用 __int128）</span><br><span class="line"></span><br><span class="line">下面这份代码：</span><br><span class="line"></span><br><span class="line">* **不依赖你给的 Pell 模板**</span><br><span class="line">* 全部 `__int128`</span><br><span class="line">* 自动生成并筛选</span><br><span class="line">* 找到最小的 **12 个**</span><br><span class="line">* 输出 `∑ L`</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">### ✅ 完整 C++ 代码</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="keyword">using</span> i128 = <span class="type">__int128_t</span>;</span><br><span class="line"></span><br><span class="line"><span class="function">string <span class="title">to_string</span><span class="params">(i128 x)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (x == <span class="number">0</span>) <span class="keyword">return</span> <span class="string">&quot;0&quot;</span>;</span><br><span class="line">    <span class="type">bool</span> neg = <span class="literal">false</span>;</span><br><span class="line">    <span class="keyword">if</span> (x &lt; <span class="number">0</span>) x = -x, neg = <span class="literal">true</span>;</span><br><span class="line">    string s;</span><br><span class="line">    <span class="keyword">while</span> (x) &#123;</span><br><span class="line">        s.<span class="built_in">push_back</span>(<span class="string">&#x27;0&#x27;</span> + x % <span class="number">10</span>);</span><br><span class="line">        x /= <span class="number">10</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">if</span> (neg) s.<span class="built_in">push_back</span>(<span class="string">&#x27;-&#x27;</span>);</span><br><span class="line">    <span class="built_in">reverse</span>(s.<span class="built_in">begin</span>(), s.<span class="built_in">end</span>());</span><br><span class="line">    <span class="keyword">return</span> s;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    vector&lt;i128&gt; Ls;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 初始解 y^2 - 5L^2 = -1</span></span><br><span class="line">    i128 y = <span class="number">2</span>, L = <span class="number">1</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">while</span> ((<span class="type">int</span>)Ls.<span class="built_in">size</span>() &lt; <span class="number">12</span>) &#123;</span><br><span class="line">        <span class="comment">// 检查 y ≡ ±2 (mod 5)</span></span><br><span class="line">        <span class="keyword">if</span> ((y - <span class="number">2</span>) % <span class="number">5</span> == <span class="number">0</span>) &#123;</span><br><span class="line">            i128 x = (y - <span class="number">2</span>) / <span class="number">5</span>;</span><br><span class="line">            <span class="keyword">if</span> (x &gt; <span class="number">0</span>) Ls.<span class="built_in">push_back</span>(L);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">if</span> ((y + <span class="number">2</span>) % <span class="number">5</span> == <span class="number">0</span>) &#123;</span><br><span class="line">            i128 x = (y + <span class="number">2</span>) / <span class="number">5</span>;</span><br><span class="line">            <span class="keyword">if</span> (x &gt; <span class="number">0</span>) Ls.<span class="built_in">push_back</span>(L);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="comment">// Pell 递推</span></span><br><span class="line">        i128 ny = <span class="number">9</span>*y + <span class="number">20</span>*L;</span><br><span class="line">        i128 nL = <span class="number">4</span>*y + <span class="number">9</span>*L;</span><br><span class="line">        y = ny;</span><br><span class="line">        L = nL;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="built_in">sort</span>(Ls.<span class="built_in">begin</span>(), Ls.<span class="built_in">end</span>());</span><br><span class="line">    Ls.<span class="built_in">resize</span>(<span class="number">12</span>);</span><br><span class="line"></span><br><span class="line">    i128 sum = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">auto</span> v : Ls) sum += v;</span><br><span class="line"></span><br><span class="line">    cout &lt;&lt; <span class="built_in">to_string</span>(sum) &lt;&lt; <span class="string">&quot;\n&quot;</span>;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
