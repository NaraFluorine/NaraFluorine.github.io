          <h2 id="user"><a href="#user" class="headerlink" title="user"></a>user</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">二项式系数质因数分解</span><br><span class="line"></span><br><span class="line">二项式系数C(10,3) = 120。</span><br><span class="line">120 = 23 × 3 × 5 = 2 × 2 × 2 × 3 × 5，而2 + 2 + 2 + 3 + 5 = 14。</span><br><span class="line">因此C(10,3)质因数分解后各项的和为14。</span><br><span class="line"></span><br><span class="line">求C(20000000,15000000)质因数分解后各项的和。</span><br><span class="line"></span><br><span class="line">我的思路:组合数能被表达为阶乘,对阶乘质因数分解,用一个欧拉筛筛出质数用于质因数分解,然后记录每个质数的出现次数即可.</span><br><span class="line"></span><br><span class="line">请给我c++代码实现.</span><br></pre></td></tr></table></figure>
<h2 id="gpt"><a href="#gpt" class="headerlink" title="gpt"></a>gpt</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br></pre></td><td class="code"><pre><span class="line">你的思路是**完全正确的，而且是正解思路** 👍</span><br><span class="line">这个问题的关键在于：**不能真的算组合数，也不能真的分解阶乘**，而是要用**勒让德公式（Legendre formula）统计每个质数在阶乘中的指数**。</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 一、数学思路整理（与你的思路对齐）</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">C(n,k) = \frac&#123;n!&#125;&#123;k!(n-k)!&#125;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">对任意质数 (p)，它在 (n!) 中的指数为：</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">e_p(n!) = \sum_&#123;i=1&#125;^&#123;\infty&#125; \left\lfloor \frac&#123;n&#125;&#123;p^i&#125; \right\rfloor</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">那么在组合数中的指数就是：</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">e_p(C(n,k)) = e_p(n!) - e_p(k!) - e_p((n-k)!)</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">而题目要求的是：</span><br><span class="line"></span><br><span class="line">&gt; **质因数分解后所有因子的和（带重数）**</span><br><span class="line"></span><br><span class="line">也就是：</span><br><span class="line"></span><br><span class="line">[</span><br><span class="line">\sum_&#123;p \text&#123; prime&#125;&#125; p \times e_p(C(n,k))</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 二、算法步骤</span><br><span class="line"></span><br><span class="line">1. 用 **欧拉筛** 或普通筛法筛出 **所有 ≤ n 的质数**</span><br><span class="line">2. 对每个质数 (p)</span><br><span class="line"></span><br><span class="line">   * 用勒让德公式计算</span><br><span class="line">     (e_p(n!))、(e_p(k!))、(e_p((n-k)!))</span><br><span class="line">   * 得到 (e_p(C(n,k)))</span><br><span class="line">3. 累加 `p * 指数`</span><br><span class="line">4. 输出结果</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 三、复杂度分析</span><br><span class="line"></span><br><span class="line">* 筛质数：</span><br><span class="line">  [</span><br><span class="line">  O(n)</span><br><span class="line">  ]</span><br><span class="line">* 每个质数计算指数：</span><br><span class="line">  [</span><br><span class="line">  O(\log_p n)</span><br><span class="line">  ]</span><br><span class="line">* 总复杂度：</span><br><span class="line">  [</span><br><span class="line">  O(n)</span><br><span class="line">  ]</span><br><span class="line"></span><br><span class="line">对于 `n = 2e7` 是**完全可行的**（内存约 80MB 以内）</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 四、C++ 实现代码（高效 &amp; 可直接提交）</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="keyword">using</span> int64 = <span class="type">long</span> <span class="type">long</span>;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    ios::<span class="built_in">sync_with_stdio</span>(<span class="literal">false</span>);</span><br><span class="line">    cin.<span class="built_in">tie</span>(<span class="literal">nullptr</span>);</span><br><span class="line"></span><br><span class="line">    <span class="type">const</span> <span class="type">int</span> N = <span class="number">20000000</span>;</span><br><span class="line">    <span class="type">const</span> <span class="type">int</span> K = <span class="number">15000000</span>;</span><br><span class="line">    <span class="type">const</span> <span class="type">int</span> NK = N - K;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 欧拉筛</span></span><br><span class="line">    vector&lt;<span class="type">int</span>&gt; primes;</span><br><span class="line">    <span class="function">vector&lt;<span class="type">bool</span>&gt; <span class="title">is_composite</span><span class="params">(N + <span class="number">1</span>, <span class="literal">false</span>)</span></span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">2</span>; i &lt;= N; ++i) &#123;</span><br><span class="line">        <span class="keyword">if</span> (!is_composite[i]) primes.<span class="built_in">push_back</span>(i);</span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> p : primes) &#123;</span><br><span class="line">            <span class="keyword">if</span> ((int64)i * p &gt; N) <span class="keyword">break</span>;</span><br><span class="line">            is_composite[i * p] = <span class="literal">true</span>;</span><br><span class="line">            <span class="keyword">if</span> (i % p == <span class="number">0</span>) <span class="keyword">break</span>;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">auto</span> count_exp = [&amp;](<span class="type">int</span> n, <span class="type">int</span> p) &#123;</span><br><span class="line">        int64 cnt = <span class="number">0</span>;</span><br><span class="line">        <span class="keyword">while</span> (n) &#123;</span><br><span class="line">            n /= p;</span><br><span class="line">            cnt += n;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> cnt;</span><br><span class="line">    &#125;;</span><br><span class="line"></span><br><span class="line">    int64 answer = <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> p : primes) &#123;</span><br><span class="line">        int64 e =</span><br><span class="line">            <span class="built_in">count_exp</span>(N, p)</span><br><span class="line">          - <span class="built_in">count_exp</span>(K, p)</span><br><span class="line">          - <span class="built_in">count_exp</span>(NK, p);</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (e &gt; <span class="number">0</span>) &#123;</span><br><span class="line">            answer += (int64)p * e;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    cout &lt;&lt; answer &lt;&lt; <span class="string">&#x27;\n&#x27;</span>;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">---</span><br><span class="line"></span><br><span class="line">## 五、一些容易踩的坑</span><br><span class="line"></span><br><span class="line">✅ **不能用 `int` 存结果** → 必须 `int64`</span><br><span class="line">✅ **不能真的算阶乘** → 数字会爆</span><br><span class="line">✅ **不能试除分解组合数本身** → 不可能完成</span><br><span class="line">✅ **必须用勒让德公式**</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"></span><br><span class="line">## 六、总结一句话</span><br><span class="line"></span><br><span class="line">&gt; **这是一个“组合数 × 质因数 × 勒让德公式”的经典大数题，本质是统计指数而不是算值。**</span><br><span class="line"></span><br><span class="line">如果你愿意，我也可以帮你：</span><br><span class="line"></span><br><span class="line">* 优化到更低内存版本</span><br><span class="line">* 改成分块筛</span><br><span class="line">* 或解释为什么这题不需要 Lucas / Kummer 定理</span><br><span class="line"></span><br><span class="line">随时继续 👍</span><br><span class="line"></span><br></pre></td></tr></table></figure>
