          <h2 id="user"><a href="#user" class="headerlink" title="user"></a>user</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">一个不少，两个正好</span><br><span class="line">不断抛掷一枚标准硬币，直到连续两次抛出正面，记此时已经抛掷的次数为M。令P(n)表示M被n整除的概率。比方说，在计算P(2)时，如“正正”、“正反正正”或是“反正反反正正”这样的抛掷结果都要算入，而“反正正”或“正反反正正”就不算。</span><br><span class="line"></span><br><span class="line">已知P(2)=\frac 3 5  和 P(3)=\frac&#123;9&#125;&#123;31&#125; 。实际上，可以证明P(n)总是有理数。</span><br><span class="line"></span><br><span class="line">对于素数p和最简分数a/b，记 Q(\frac&#123;a&#125;&#123;b&#125;,p) 为满足a\equiv bq\pmod p 的最小正整数q。例如，Q(P(2),109)=Q(\frac&#123;3&#125;&#123;5&#125;,109)=66， 这是因为5\cdot66=330\equiv 3 \pmod&#123;109&#125;且66是满足上式的最小正整数；同理可得Q(P(3),109)=46。</span><br><span class="line"></span><br><span class="line">求Q(P(10^&#123;18&#125;),1\ 000\ 000\ 009)。</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">我的思路:首先计算P(10**18).对于长度为n(n是一个偶数)的末尾为两个连续正而且前面不出现两个连续正的,可以这么思考:</span><br><span class="line">其实只有两种结果,一个是反,另一个是正反,两种共同铺满长度为 n-2的结果,然后按照长度除掉 2^n.</span><br><span class="line">这么加起来算一算结果式子即可.</span><br><span class="line"></span><br><span class="line">然后考虑计算Q函数:这不就是模意义下的逆元吗...</span><br><span class="line"></span><br><span class="line">请给我cpp实现.</span><br></pre></td></tr></table></figure>

ass="line">423</span><br><span class="line">424</span><br><span class="line">425</span><br><span class="line">426</span><br><span class="line">427</span><br><span class="line">428</span><br><span class="line">429</span><br><span class="line">430</span><br><span class="line">431</span><br><span class="line">432</span><br><span class="line">433</span><br><span class="line">434</span><br><span class="line">435</span><br><span class="line">436</span><br><span class="line">437</span><br><span class="line">438</span><br><span class="line">439</span><br><span class="line">440</span><br><span class="line">441</span><br><span class="line">442</span><br><span class="line">443</span><br><span class="line">444</span><br><span class="line">445</span><br><span class="line">446</span><br><span class="line">447</span><br><span class="line">448</span><br><span class="line">449</span><br><span class="line">450</span><br><span class="line">451</span><br><span class="line">452</span><br><span class="line">453</span><br><span class="line">454</span><br><span class="line">455</span><br><span class="line">456</span><br><span class="line">457</span><br><span class="line">458</span><br><span class="line">459</span><br><span class="line">460</span><br><span class="line">461</span><br><span class="line">462</span><br><span class="line">463</span><br><span class="line">464</span><br><span class="line">465</span><br><span class="line">466</span><br><span class="line">467</span><br><span class="line">468</span><br><span class="line">469</span><br><span class="line">470</span><br><span class="line">471</span><br><span class="line">472</span><br><span class="line">473</span><br><span class="line">474</span><br><span class="line">475</span><br><span class="line">476</span><br><span class="line">477</span><br><span class="line">478</span><br><span class="line">479</span><br><span class="line">480</span><br><span class="line">481</span><br><span class="line">482</span><br><span class="line">483</span><br><span class="line">484</span><br><span class="line">485</span><br><span class="line">486</span><br><span class="line">487</span><br><span class="line">488</span><br><span class="line">489</span><br><span class="line">490</span><br><span class="line">491</span><br><span class="line">492</span><br><span class="line">493</span><br><span class="line">494</span><br><span class="line">495</span><br><span class="line">496</span><br><span class="line">497</span><br><span class="line">498</span><br><span class="line">499</span><br><span class="line">500</span><br><span class="line">501</span><br><span class="line">502</span><br><span class="line">503</span><br><span class="line">504</span><br><span class="line">505</span><br><span class="line">506</span><br><span class="line">507</span><br><span class="line">508</span><br><span class="line">509</span><br><span class="line">510</span><br><span class="line">511</span><br><span class="line">512</span><br><span class="line">513</span><br><span class="line">514</span><br><span class="line">515</span><br><span class="line">516</span><br><span class="line">517</span><br><span class="line">518</span><br><span class="line">519</span><br><span class="line">520</span><br><span class="line">521</span><br><span class="line">522</span><br><span class="line">523</span><br><span class="line">524</span><br><span class="line">525</span><br><span class="line">526</span><br><span class="line">527</span><br><span class="line">528</span><br><span class="line">529</span><br><span class="line">530</span><br><span class="line">531</span><br><span class="line">532</span><br><span class="line">533</span><br><span class="line">534</span><br><span class="line">535</span><br><span class="line">536</span><br><span class="line">537</span><br><span class="line">538</span><br><span class="line">539</span><br><span class="line">540</span><br><span class="line">541</span><br><span class="line">542</span><br><span class="line">543</span><br><span class="line">544</span><br><span class="line">545</span><br><span class="line">546</span><br><span class="line">547</span><br><span class="line">548</span><br><span class="line">549</span><br><span class="line">550</span><br><span class="line">551</span><br><span class="line">552</span><br><span class="line">553</span><br><span class="line">554</span><br><span class="line">555</span><br><span class="line">556</span><br><span class="line">557</span><br><span class="line">558</span><br><span class="line">559</span><br><span class="line">560</span><br><span class="line">561</span><br><span class="line">562</span><br><span class="line">563</span><br><span class="line">564</span><br><span class="line">565</span><br><span class="line">566</span><br><span class="line">567</span><br><span class="line">568</span><br><span class="line">569</span><br><span class="line">570</span><br><span class="line">571</span><br><span class="line">572</span><br><span class="line">573</span><br><span class="line">574</span><br><span class="line">575</span><br><span class="line">576</span><br><span class="line">577</span><br><span class="line">578</span><br><span class="line">579</span><br><span class="line">580</span><br><span class="line">581</span><br><span class="line">582</span><br><span class="line">583</span><br><span class="line">584</span><br><span class="line">585</span><br><span class="line">586</span><br></pre></td><td class="code"><pre><span class="line">我们被问到：</span><br><span class="line"></span><br><span class="line">&quot;一个不少，两个正好</span><br><span class="line">不断抛掷一枚标准硬币，直到连续两次抛出正面，记此时已经抛掷的次数为M。令P(n)表示M被n整除的概率。比方说，在计算P(2)时，如“正正”、“正反正正”或是“反正反反正正”这样的抛掷结果都要算入，而“反正正”或“正反反正正”就不算。</span><br><span class="line"></span><br><span class="line">已知P(2)=3/5 和 P(3)=9/31。实际上，可以证明P(n)总是有理数。</span><br><span class="line"></span><br><span class="line">对于素数p和最简分数a/b，记 Q(a/b, p) 为满足 a ≡ b q (mod p) 的最小正整数q。例如，Q(P(2),109)=Q(3/5,109)=66，因为5*66=330≡3(mod 109)且66是满足的最小正整数；同理可得Q(P(3),109)=46。</span><br><span class="line"></span><br><span class="line">求Q(P(10^18), 1 000 000 009)。</span><br><span class="line"></span><br><span class="line">我的思路:首先计算P(10**18).对于长度为n(n是一个偶数)的末尾为两个连续正而且前面不出现两个连续正的,可以这么思考:</span><br><span class="line">其实只有两种结果,一个是反,另一个是正反,两种共同铺满长度为 n-2的结果,然后按照长度除掉 2^n.</span><br><span class="line">这么加起来算一算结果式子即可.</span><br><span class="line"></span><br><span class="line">然后考虑计算Q函数:这不就是模意义下的逆元吗...</span><br><span class="line"></span><br><span class="line">请给我cpp实现.&quot;</span><br><span class="line"></span><br><span class="line">我们需要计算P(n)，其中n = 10^18，然后对于素数p = 1000000009（注意：1 000 000 009 = 10^9+9，是素数吗？是的，1000000009是已知素数，通常用于模运算）。然后给定P(n) = a/b为最简分数，求最小正整数q使得 a ≡ b q (mod p)，即 q ≡ a * b^&#123;-1&#125; (mod p)，并且 q 在 1 到 p-1 之间（最小正整数）。因为p是素数，且b不是p的倍数，这等价于模p下的除法。</span><br><span class="line"></span><br><span class="line">所以任务是：</span><br><span class="line"></span><br><span class="line">推导P(n)的公式。</span><br><span class="line"></span><br><span class="line">对于n=10^18，计算P(n)的有理数表示，或者直接计算a * b^&#123;-1&#125; mod p，其中p=1000000009。我们可能不需要求出有理数，而是求出模p下的值。P(n)可以表示为模p下的有理数吗？因为概率是有理数，我们需要模p下的a * b^&#123;-1&#125; mod p。如果我们可以直接计算概率在模p下的值（即a * b^&#123;-1&#125; mod p），那么q就是这个值（如果值介于1和p-1之间）。但注意：q是最小正整数满足同余式，所以如果算出a*b^&#123;-1&#125; mod p得到的是0？概率不会是0吧。算出的就是q。</span><br><span class="line"></span><br><span class="line">我们需要推导P(n)的确切表达式。题意：M是直到连续两次正面的抛掷次数。求P(n) = P(M能被n整除)。</span><br><span class="line"></span><br><span class="line">已知P(2)=3/5, P(3)=9/31。我们需要一般公式。M的分布是著名的：等待时间直到出现&quot;HH&quot;（正面正面）的分布。其概率生成函数或质量函数已知。</span><br><span class="line">设抛掷硬币直到出现连续两次正面。抛掷次数为M。M的概率质量函数为：</span><br><span class="line">P(M = k) = F_&#123;k-1&#125; / 2^k 对于k&gt;=2？实际上，经典的抛硬币直到连续两次正面的次数分布：P(M=k) = Fib(k-1) / 2^k，其中Fib(1)=1, Fib(2)=1, Fib(3)=2等？让我们验证。</span><br><span class="line">对于k=2: M=2对应“正正”。概率=1/4。Fib(1)=1, 1/4=1/4。正确。</span><br><span class="line">k=3: M=3对应“反正正”，概率=1/8。Fib(2)=1, 1/8。正确。</span><br><span class="line">k=4: 序列末尾为“正反正正”或“反反正正”？实际上长度为4且以HH结尾且之前没有HH的序列：只能以T开头，然后H,H？或者T,T,H,H？让我们列出：TTHH, HTHH？HTHH在第三个是H？序列：H,T,H,H。但前三个包含HH吗？HTH没有HH。T,H,H？THH有HH！等等，我们要求第一次出现连续两次正面是在最后两次。所以序列不能提前出现HH。对于k=4：可能序列：</span><br><span class="line">T T H H (概率1/16)</span><br><span class="line">H T H H (概率1/16)</span><br><span class="line">T H H H？但前三个有HH（第二、三位是HH），所以不行。</span><br><span class="line">所以有两个序列，概率2/16=1/8。而Fib(3)=2，所以P(M=4)=2/16=1/8。正确。</span><br><span class="line">所以P(M=k) = F_&#123;k-1&#125; / 2^k，其中F_1=1, F_2=1, F_3=2, F_4=3, F_5=5,... 即斐波那契数列。</span><br><span class="line">验证k=5: Fib(4)=3，P(M=5)=3/32。正确。</span><br><span class="line">所以M的分布是P(M=k) = F_&#123;k-1&#125;/2^k for k&gt;=2，且sum_&#123;k=2&#125;^\infty F_&#123;k-1&#125;/2^k = 1? 已知 sum F_k x^k = x/(1-x-x^2)。令x=1/2，sum_&#123;k=1&#125; F_k /2^k = (1/2) / (1 - 1/2 - 1/4) = (1/2)/(1/4)=2。所以 sum_&#123;k=2&#125; F_&#123;k-1&#125;/2^k = sum_&#123;m=1&#125; F_m /2^&#123;m+1&#125; = 1/2 * 2 =1。正确。</span><br><span class="line"></span><br><span class="line">因此P(n) = P(M ≡ 0 mod n) = sum_&#123;m=1&#125;^\infty P(M = m n)？注意M的最小值是2，所以m n &gt;=2。因此</span><br><span class="line">P(n) = sum_&#123;m=1&#125;^\infty F_&#123;m n - 1&#125; / 2^&#123;m n&#125;.</span><br><span class="line"></span><br><span class="line">对于给定的n，我们需要求这个无限级数。通常这涉及斐波那契数的生成函数。我们可以用斐波那契数的Binet公式或者利用模周期性？这里n=10^18，非常大，直接求和不可能。我们需要P(n)的闭式或简化。</span><br><span class="line"></span><br><span class="line">观察：P(M = k) = F_&#123;k-1&#125;/2^k。所以P(n) = sum_&#123;j=0&#125;^\infty F_&#123;n j + n - 1&#125; / 2^&#123;n j + n&#125;，其中j从0开始？令m = j+1，m从1到∞：P(n) = sum_&#123;m=1&#125;^\infty F_&#123;m n -1&#125; /2^&#123;m n&#125;.</span><br><span class="line">已知 sum_&#123;k=1&#125;^\infty F_k x^k = x/(1-x-x^2)。而我们需要提取指数模n同余于-1的那些项。这可以使用选择根（roots of unity filter）：</span><br><span class="line">P(n) = sum_&#123;k=2, k≡0 mod n&#125; F_&#123;k-1&#125;/2^k = sum_&#123;t=0&#125;^&#123;n-1&#125; ... 使用单位根。</span><br><span class="line">但注意我们要求k是n的倍数，即k ≡ 0 (mod n)。所以k-1 ≡ -1 (mod n)。所以我们可以写出：</span><br><span class="line">P(n) = (1/n) * sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;-j(-1)&#125; ? 稍等。</span><br><span class="line"></span><br><span class="line">设S = sum_&#123;k=1&#125;^\infty F_k x^k = x/(1-x-x^2)，其中x = 1/2。但我们要的是k = m n - 1，m&gt;=1。所以 sum_&#123;m=1&#125;^\infty F_&#123;mn-1&#125; x^&#123;mn&#125; = x * sum_&#123;m=1&#125;^\infty F_&#123;mn-1&#125; x^&#123;mn-1&#125; = x * T，其中T = sum_&#123;r, r ≡ -1 mod n&#125; F_r x^r。可以用单位根提取：</span><br><span class="line">T = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;j&#125; S(ω^&#123;-j&#125; x)？让我们仔细推导。</span><br><span class="line"></span><br><span class="line">设 S(z) = sum_&#123;k=1&#125;^\infty F_k z^k = z/(1-z-z^2)。我们需要 sum_&#123;r≡-1 (mod n)&#125; F_r z^r = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;j(-1)?&#125; S(ω^j z)? 实际上，标准筛选：sum_&#123;r≡a mod n&#125; a_r = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;-j a&#125; sum_r a_r ω^&#123;j r&#125;。这里a_r = F_r z^r，a = -1 mod n。所以：</span><br><span class="line">sum_&#123;r≡-1&#125; F_r z^r = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;j&#125; S(ω^j z)。因为 ω^&#123;-j*(-1)&#125; = ω^j。</span><br><span class="line">所以 T = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^j S(ω^j z).</span><br><span class="line">那么 P(n) = sum_&#123;m=1&#125; F_&#123;mn-1&#125; z^&#123;mn&#125; = z * T = z * (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^j S(ω^j z)，其中z=1/2。</span><br><span class="line">故 P(n) = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^j * (ω^j z) / (1 - ω^j z - (ω^j z)^2) = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;2j&#125; z / (1 - ω^j z - ω^&#123;2j&#125; z^2). (注意 z 是 1/2)</span><br><span class="line">简化：P(n) = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;2j&#125; z / (1 - ω^j z - ω^&#123;2j&#125; z^2).</span><br><span class="line">其中z=1/2，ω = exp(2πi/n) 是n次本原单位根。</span><br><span class="line"></span><br><span class="line">这个表达式对于任何n都成立。我们需要对于n=10^18，在模p=1000000009下计算P(n)。但是n太大了，循环求和有10^18项，不可能直接求。但也许由于斐波那契数的模周期性，或者这个和可以进一步化简为涉及斐波那契数和卢卡斯数的闭式。</span><br><span class="line"></span><br><span class="line">我们知道 sum_&#123;k=1&#125;^\infty F_&#123;kn&#125; x^&#123;kn&#125; 可以用斐波那契多项式的公式？实际上，已知：</span><br><span class="line">sum_&#123;m=0&#125;^\infty F_&#123;a m + b&#125; z^&#123;a m + b&#125; 有闭式，也许通过解线性递推。</span><br><span class="line">由于M的分布服从递推？M的生成函数是 E(z^M) = z^2 / (4 - 2z - z^2)？我们来检查一下。</span><br><span class="line">之前我们有P(M=k) = F_&#123;k-1&#125;/2^k。所以概率生成函数：G(z) = sum_&#123;k=2&#125;^\infty P(M=k) z^k = sum_&#123;k=2&#125; F_&#123;k-1&#125; (z/2)^k = (z/2)^2 sum_&#123;m=1&#125; F_m (z/2)^m = (z^2/4) * (z/2) / (1 - z/2 - z^2/4) = (z^3/8) / ((4 - 2z - z^2)/4) = z^3 / (2(4 - 2z - z^2))? 再算一下：</span><br><span class="line">sum_&#123;m=1&#125; F_m y^m = y/(1-y-y^2). 令y = z/2. 则 sum_&#123;m=1&#125; F_m (z/2)^m = (z/2) / (1 - z/2 - z^2/4) = (z/2) / ((4 - 2z - z^2)/4) = 2z / (4 - 2z - z^2).</span><br><span class="line">所以 G(z) = (z/2)^2 * 2z/(4-2z-z^2) = (z^2/4)(2z/(4-2z-z^2)) = z^3/(2(4-2z-z^2)).</span><br><span class="line">我们来验证：对于P(2)是否可以得到3/5？P(2) = P(M 是偶数)？不对，P(2)是M被2整除的概率，即所有偶数k的概率和。</span><br><span class="line">P(M是偶数) = (G(1)+G(-1))/2.</span><br><span class="line">G(1) = 1/(2(4-2-1)) = 1/2.</span><br><span class="line">G(-1) = (-1)/(2(4+2-1)) = -1/(2*5) = -1/10.</span><br><span class="line">所以 P(2) = (1/2 - 1/10)/2? 等等，(G(1)+G(-1))/2 = (1/2 - 1/10)/2 = (5/10 - 1/10)/2 = (4/10)/2 = 4/20 = 1/5. 但已知P(2)=3/5！矛盾。</span><br><span class="line"></span><br><span class="line">哪里出错了？</span><br><span class="line">我们检查：G(z) = sum_&#123;k=2&#125; P(M=k) z^k. P(M=2)=1/4, M=3=1/8, M=4=2/16=1/8, ...</span><br><span class="line">G(z) = 1/4 z^2 + 1/8 z^3 + 1/8 z^4 + 3/32 z^5 + ...</span><br><span class="line">代入z=1: sum P = 1/4+1/8+1/8+... =1 正确。</span><br><span class="line">如果 G(z) = z^3/(2(4-2z-z^2))，我们算 G(1) = 1/(2*(1)) = 1/2. 但是G(1)必须是1！因为所有概率和为1。所以我们的G(z)公式错了，因为G(1)应该等于1。</span><br><span class="line">重新计算：sum_&#123;k=2&#125; F_&#123;k-1&#125; (z/2)^k. 令 m = k-1, 则 m从1开始，k=m+1. sum_&#123;m=1&#125; F_m (z/2)^&#123;m+1&#125; = (z/2) sum_&#123;m=1&#125; F_m (z/2)^m = (z/2) * [ (z/2)/(1 - z/2 - (z/2)^2) ] = (z^2/4) / (1 - z/2 - z^2/4) = (z^2/4) / ((4 - 2z - z^2)/4) = z^2 / (4 - 2z - z^2).</span><br><span class="line">验证：z=1: 1/(4-2-1)=1. 正确。所以 G(z) = z^2 / (4 - 2z - z^2).</span><br><span class="line">那么 P(M是偶数) = (G(1)+G(-1))/2. G(1)=1. G(-1) = 1/(4 +2 -1) = 1/5. 所以 (1+1/5)/2 = 6/10 = 3/5. 正确！P(2)=3/5. 好的。</span><br><span class="line">对于P(3)，即M被3整除。概率为 (G(1)+G(ω)+G(ω^2))/3，其中ω=exp(2πi/3). 已知P(3)=9/31。</span><br><span class="line"></span><br><span class="line">所以我们有一个明确的生成函数 G(z) = z^2 / (4 - 2z - z^2)。</span><br><span class="line">那么 P(n) = sum_&#123;k≡0 mod n&#125; P(M=k) = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; G(ω^j) 其中 ω = exp(2πi/n).</span><br><span class="line">所以 P(n) = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; ω^&#123;2j&#125; / (4 - 2ω^j - ω^&#123;2j&#125;).</span><br><span class="line">这是我们之前的结果（之前我们有z=1/2之类，现在直接用生成函数更方便）。</span><br><span class="line"></span><br><span class="line">现在我们需要用闭式表示 P(n)。可以利用分式分解。</span><br><span class="line">分母 4 - 2z - z^2 = -(z^2 + 2z - 4)。其根为 z = (-2 ± sqrt(4 + 16))/2 = -1 ± sqrt(5)。设 φ = (1+sqrt(5))/2 ≈ 1.618，则 -1 - sqrt(5) = -2φ？等等。sqrt(5) = 2φ - 1？ 实际上 φ = (1+√5)/2, 所以 √5 = 2φ - 1。</span><br><span class="line">那么根： r1 = -1 + √5 = -1 + 2φ - 1 = 2φ - 2 = 2(φ-1) = 2/φ，因为 φ-1 = 1/φ。</span><br><span class="line">r2 = -1 - √5 = -1 - (2φ-1) = -2φ。</span><br><span class="line">所以分母 = -(z - r1)(z - r2) = (r1 - z)(r2 - z)？不，4 - 2z - z^2 = (r1 - z)(z - r2)? 还是用部分分式。</span><br><span class="line">G(z) = z^2 / (4 - 2z - z^2) = -z^2 / (z^2 + 2z - 4) = -z^2 / ((z - r1)(z - r2)).</span><br><span class="line">做部分分式：z^2 / ((z - r1)(z - r2)) = A + B/(z - r1) + C/(z - r2)? 因为分子次数等于分母，先做多项式除法：</span><br><span class="line">z^2 / (z^2+2z-4) = 1 - (2z-4)/(z^2+2z-4). 所以 -z^2/(z^2+2z-4) = -1 + (2z-4)/(z^2+2z-4). 然后分解 (2z-4)/((z-r1)(z-r2)) = D/(z-r1) + E/(z-r2).</span><br><span class="line">我们有 r1 = 2/φ, r2 = -2φ.</span><br><span class="line">那么 D = (2r1-4)/(r1-r2), E = (2r2-4)/(r2-r1).</span><br><span class="line">因为 r1 - r2 = 2/φ + 2φ = 2(φ + 1/φ) = 2√5. （因为 φ + 1/φ = √5? 等一下：φ = (1+√5)/2, 1/φ = (√5-1)/2, 和 = √5。对）。</span><br><span class="line">计算：2r1-4 = 4/φ - 4 = 4(1-φ)/φ = -4(φ-1)/φ = -4/φ^2，因为 φ-1 = 1/φ.</span><br><span class="line">2r2-4 = -4φ - 4 = -4(φ+1). 注意 φ+1 = φ^2.</span><br><span class="line">所以 D = (-4/φ^2) / (2√5) = -2/(φ^2 √5).</span><br><span class="line">E = (-4φ^2) / (-2√5) = 2φ^2 / √5.</span><br><span class="line">因此 G(z) = -1 + D/(z - r1) + E/(z - r2) = -1 - 2/(φ^2 √5) * 1/(z - 2/φ) + 2φ^2/√5 * 1/(z + 2φ).</span><br><span class="line"></span><br><span class="line">实际上我们可以写 G(z) = -1 + sum_&#123;j&#125; ... 但P(n) = (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; G(ω^j).</span><br><span class="line">注意到 sum_&#123;j=0&#125;^&#123;n-1&#125; 1 = n，所以 -1 的部分贡献为 -1。</span><br><span class="line">所以 P(n) = -1 + (1/n) sum_&#123;j=0&#125;^&#123;n-1&#125; [ D/(ω^j - r1) + E/(ω^j - r2) ].</span><br><span class="line"></span><br><span class="line">我们需要计算 sum_&#123;j=0&#125;^&#123;n-1&#125; 1/(ω^j - r) ，其中 r 是常数。这是经典的和式，可以用公式：</span><br><span class="line">sum_&#123;j=0&#125;^&#123;n-1&#125; 1/(ω^j - r) = n r^&#123;n-1&#125;/(r^n - 1)？我们来验证。</span><br><span class="line">考虑多项式 z^n - 1 = prod_&#123;j=0&#125;^&#123;n-1&#125; (z - ω^j). 对数导数： (n z^&#123;n-1&#125;)/(z^n - 1) = sum_&#123;j=0&#125;^&#123;n-1&#125; 1/(z - ω^j). 令 z = r，我们有 sum 1/(r - ω^j) = n r^&#123;n-1&#125;/(r^n - 1). 所以 sum 1/(ω^j - r) = - n r^&#123;n-1&#125;/(r^n - 1). 因此：</span><br><span class="line">(1/n) sum 1/(ω^j - r) = - r^&#123;n-1&#125;/(r^n - 1) = 1/(1 - r^n) * r^&#123;n-1&#125;? 实际上是 -r^&#123;n-1&#125;/(r^n-1) = r^&#123;n-1&#125;/(1 - r^n). 是的。</span><br><span class="line"></span><br><span class="line">因此：</span><br><span class="line">(1/n) sum_&#123;j&#125; D/(ω^j - r1) = D * r1^&#123;n-1&#125; / (1 - r1^n).</span><br><span class="line">(1/n) sum_&#123;j&#125; E/(ω^j - r2) = E * r2^&#123;n-1&#125; / (1 - r2^n).</span><br><span class="line"></span><br><span class="line">所以 P(n) = -1 + D * r1^&#123;n-1&#125;/(1 - r1^n) + E * r2^&#123;n-1&#125;/(1 - r2^n).</span><br><span class="line"></span><br><span class="line">现在代入 D, E, r1, r2:</span><br><span class="line">r1 = 2/φ = 2(φ-1)? 因为 1/φ = φ-1. 其实 φ = (1+√5)/2, 1/φ = (√5-1)/2. r1 = √5 - 1. 因为 2/φ = 2*(√5-1)/2 = √5 - 1.</span><br><span class="line">r2 = -2φ = - (1+√5) = -√5 - 1.</span><br><span class="line">让我们检查 r1 和 r2 是否是 4-2z-z^2=0 的根：</span><br><span class="line">r1 = √5 - 1 ≈ 2.236-1=1.236. 4 - 2(1.236) - 1.236^2 = 4 - 2.472 - 1.527 ≈ 0. 正确。</span><br><span class="line">r2 = -√5 -1 ≈ -3.236. 4 - 2(-3.236) - (10.47) = 4+6.472-10.47 ≈ 0. 正确。</span><br><span class="line">我们也有 φ = (1+√5)/2.</span><br><span class="line">D 和 E 也用 √5 表示。</span><br><span class="line">之前我们有：</span><br><span class="line">D = -2/(φ^2 √5)</span><br><span class="line">E = 2φ^2 / √5.</span><br><span class="line">φ^2 = φ+1 = (3+√5)/2.</span><br><span class="line">1/φ^2 = 2/(3+√5) = 2(3-√5)/(9-5) = (6-2√5)/4 = (3-√5)/2.</span><br><span class="line">所以：</span><br><span class="line">D = -2 * (3-√5)/2 / √5 = -(3-√5)/√5 = 1 - 3/√5? 不，-(3-√5)/√5 = -3/√5 + 1.</span><br><span class="line">E = 2 * ((3+√5)/2) / √5 = (3+√5)/√5 = 3/√5 + 1.</span><br><span class="line"></span><br><span class="line">验证： D + E? 不需要。再检查 D 和 E 的值：</span><br><span class="line">用 r1, r2 表示 D 和 E：</span><br><span class="line">我们有部分分式： (2z-4)/((z-r1)(z-r2)) = D/(z-r1) + E/(z-r2)</span><br><span class="line">D = (2r1-4)/(r1-r2). r1 = √5-1, r2 = -√5-1. r1-r2 = 2√5.</span><br><span class="line">2r1-4 = 2√5 -2 -4 = 2√5 -6 = 2(√5-3).</span><br><span class="line">所以 D = 2(√5-3) / (2√5) = (√5-3)/√5 = 1 - 3/√5. 这与 -3/√5 + 1 相同。正确。</span><br><span class="line">E = (2r2-4)/(r2-r1) = (2(-√5-1)-4)/(-2√5) = (-2√5 -2 -4)/(-2√5) = (-2√5-6)/(-2√5) = (√5+3)/√5 = 1 + 3/√5. 正确。</span><br><span class="line"></span><br><span class="line">因此 P(n) = -1 + D * r1^&#123;n-1&#125;/(1 - r1^n) + E * r2^&#123;n-1&#125;/(1 - r2^n).</span><br><span class="line"></span><br><span class="line">可以简化：</span><br><span class="line">注意到 r1 = √5-1, r2 = -(√5+1). 且 r1 * r2 = -(5-1) = -4? 检查：(√5-1)(-√5-1) = - (√5-1)(√5+1) = - (5-1) = -4.</span><br><span class="line">而 G(z) 的分子是 z^2, 分母是 4-2z-z^2，根为 r1, r2.</span><br><span class="line">可能可以写成更对称的形式。</span><br><span class="line">P(n) = -1 + D * r1^&#123;n&#125; / (r1 - r1^&#123;n+1&#125;)? 原来的形式是 r1^&#123;n-1&#125;/(1 - r1^n) = r1^&#123;-1&#125; * r1^n/(1-r1^n) = (1/r1) * (1/(r1^&#123;-n&#125; - 1)). 但先保留。</span><br><span class="line"></span><br><span class="line">我们要求 P(n) = a/b 模 p 的值。由于 p = 1 000 000 009。我们需要在模 p 下计算。这里的表达式中含有 √5。这提示我们需要在模 p 下求 √5 是否存在，或者扩展域。如果 5 是模 p 的二次剩余，则可以在模 p 整数中计算；否则需要扩展到 F_&#123;p^2&#125;。不管哪种，因为 p 是固定的，我们可以在代码中处理模运算。因为最终结果是模 p 下的有理数（a * b^&#123;-1&#125; mod p），所以只要在合适的域中计算即可，结果一定是 F_p 中的元素。</span><br><span class="line"></span><br><span class="line">我们还需要注意 P(n) 的最简分数 a/b，但 Q 定义为 a ≡ b q (mod p) 的最小正整数 q，即 q ≡ a * b^&#123;-1&#125; (mod p)（取模 p 的最小正剩余）。我们只需直接计算 P(n) mod p，即计算有理数 a/b mod p 的值（即 a * inv(b) mod p）。因为如果我们在模 p 下计算 P(n) 为一个整数（通过模逆元），那正是 q。</span><br><span class="line"></span><br><span class="line">所以任务归结为：计算 P(10^18) mod p，其中 p = 1000000009。</span><br><span class="line"></span><br><span class="line">我们有闭式：</span><br><span class="line">P(n) = -1 + D * r1^&#123;n-1&#125;/(1 - r1^n) + E * r2^&#123;n-1&#125;/(1 - r2^n)</span><br><span class="line">其中 D = 1 - 3/√5, E = 1 + 3/√5, r1 = √5 - 1, r2 = -√5 - 1.</span><br><span class="line"></span><br><span class="line">注意 r1 和 r2 都是代数整数。也可以将其完全有理化。</span><br><span class="line">让我们用斐波那契和卢卡斯数表示。</span><br><span class="line">已知斐波那契数 F_k = (φ^k - (-φ)^&#123;-k&#125;)/√5.</span><br><span class="line">卢卡斯数 L_k = φ^k + (-φ)^&#123;-k&#125;.</span><br><span class="line">我们有 r1 = √5 - 1 = 2/φ? 因为 φ = (1+√5)/2, 2/φ = √5 -1. 正确。</span><br><span class="line">r2 = -√5 - 1 = -2φ? 2φ = 1+√5, -2φ = -1-√5. 正确。</span><br><span class="line">那么 r1^n = (√5 - 1)^n, r2^n = (-√5 - 1)^n.</span><br><span class="line"></span><br><span class="line">我们也许可以找到 P(n) 的简单闭式。另一种方法：已知 P(n) = sum_&#123;k≡0&#125; F_&#123;k-1&#125;/2^k. 可直接用斐波那契数列模某种周期性？但我们只需计算一个具体的 n = 10^18，利用闭式在模 p 下计算。我们可以使用快速幂来计算 r1^n 和 r2^n。这需要处理 √5。在模 p 下，√5 可能存在也可能不存在。但我们总是可以定义扩展域 F_p[√5] 进行计算，最终结果一定会落在 F_p 中（因为 P(n) 是有理数）。这样我们就可以直接计算 a/b mod p。</span><br><span class="line"></span><br><span class="line">但注意：p=1000000009。我们需要确定 5 是否是模 p 的二次剩余。计算 Legendre 符号 (5/p)。p mod 5 = 1000000009 mod 5 = 4，因为 1000000000 是 5 的倍数，1000000009 ≡ 4 mod 5。 (5/p) = (p/5) 根据二次互反律，因为 5 ≡ 1 mod 4。 (p/5) = (4/5) = 1（因为 4 是平方剩余，2^2=4）。所以 5 是模 p 的平方剩余！因此 √5 在 F_p 中存在。我们可以直接计算模 p 下的平方根。</span><br><span class="line"></span><br><span class="line">求 √5 mod 1000000009。可以使用 Tonelli-Shanks 或者 Cipolla 算法。在代码中实现求平方根。或者预先计算好，因为 p 是固定的。我们可以写一个辅助函数。</span><br><span class="line"></span><br><span class="line">这样，所有运算都在 F_p 中进行，使用整数模 p。计算 D, E, r1, r2 模 p。然后计算 r1^n, r2^n 模 p。注意 n = 10^18，非常大。指数需要模 p-1 = 1000000008。因为对于底数属于 F_p，其阶整除 p-1。所以指数可以模 p-1 约简： n mod (p-1) 用于计算幂。但注意：分母中有 1 - r^n。如果 r^n = 1 mod p，则分母为零！这种情况会发生吗？p-1 = 2^3 * 3 * 7 * 11 * 13 * 17 * 19 * 23 * 29? 不一定。我们需要检查 r1 和 r2 的阶。但概率不会导致分母为零？如果 r^n = 1，则表达式中的分母为零，但极限下 P(n) 仍有限。不过实际 n=10^18 mod (p-1) 可能恰好导致分母为零吗？我们需要在计算时处理：如果 1 - r1^n ≡ 0 mod p，则不能直接用公式。可能我们可以用另一种公式，或者先计算有理表达式避免除法。我们可以检查 n mod (p-1) 后是否使分母为零。</span><br><span class="line"></span><br><span class="line">让我们先找到 √5 mod p。我们可以写程序，但这里我们只在文本中推理？用户要求“请给我cpp实现”。所以我们需要提供 C++ 代码。代码需要：</span><br><span class="line"></span><br><span class="line">计算 sqrt(5) mod p = 1000000009.</span><br><span class="line"></span><br><span class="line">然后进行模运算。</span><br><span class="line"></span><br><span class="line">需要计算 P(10^18) 模 p，返回结果 q。</span><br><span class="line"></span><br><span class="line">我们需要在代码中处理大指数模运算。可以使用 __int128 或直接用 64 位（因为 p 约为 1e9，乘法和幂需要用 64 位防止溢出，使用 unsigned long long 并做模乘）。</span><br><span class="line"></span><br><span class="line">同时注意 Q 函数要求最小正整数 q，这正好是我们计算出的模逆值（0 &lt; q &lt; p）。</span><br><span class="line"></span><br><span class="line">好的，让我们简化公式，也许可以进一步用斐波那契和卢卡斯数表示，这样可以直接用整数递推，无需显式求 √5。但因为我们只需一次计算，用 √5 方法直接。</span><br><span class="line"></span><br><span class="line">简化 P(n) 公式：</span><br><span class="line">P(n) = -1 + D * r1^&#123;n-1&#125;/(1 - r1^n) + E * r2^&#123;n-1&#125;/(1 - r2^n).</span><br><span class="line">代入 D = 1 - 3/√5, E = 1 + 3/√5.</span><br><span class="line">可以合并：</span><br><span class="line">P(n) = -1 + (1 - 3/√5)(r1^&#123;n-1&#125;/(1-r1^n)) + (1 + 3/√5)(r2^&#123;n-1&#125;/(1-r2^n)).</span><br><span class="line">我们也可以写：</span><br><span class="line">P(n) = -1 + r1^&#123;n-1&#125;/(1-r1^n) + r2^&#123;n-1&#125;/(1-r2^n) + (3/√5)*( - r1^&#123;n-1&#125;/(1-r1^n) + r2^&#123;n-1&#125;/(1-r2^n) ).</span><br><span class="line"></span><br><span class="line">但我们有 r2 = -4/r1? 因为 r1*r2 = -4. 所以 r2 = -4/r1. 这可能可以进一步简化。另外，也许我们可以将其写为关于 r1^n 和 r2^n 的对称函数。最终分母会是 (1-r1^n)(1-r2^n) = 1 - (r1^n+r2^n) + (r1 r2)^n = 1 - L_n&#x27; + (-4)^n? 注意 r1 + r2 = -2? r1+r2 = (√5-1)+(-√5-1) = -2. r1 r2 = -4. 所以 r1, r2 是方程 x^2 + 2x - 4 = 0 的根。设 V_n = r1^n + r2^n. 这是一个卢卡斯序列。V_0 = 2, V_1 = -2, V_&#123;n+1&#125; = -2 V_n + 4 V_&#123;n-1&#125;? 根据递推 x^2 = -2x + 4 =&gt; V_&#123;n&#125; = -2V_&#123;n-1&#125; + 4V_&#123;n-2&#125;. 我们可以利用模 p 下的递推计算 V_n 和 r1^n - r2^n。由于 √5 在模 p 下存在，我们可以直接用 r1,r2 进行幂运算。这并不难。</span><br><span class="line"></span><br><span class="line">但是否可能 1 - r1^n ≡ 0 mod p？若 r1^n ≡ 1 mod p，则 r1 的阶整除 n。n=10^18 mod (p-1)。我们需要评估阶。p-1 = 1000000008 = 2^3 * 3 * 7 * 11 * 13 * 17 * 19 * 23 * 29? 让我们分解：1000000008 / 8 = 125000001. 125000001 / 3 = 41666667. 41666667 / 7? 7*5952381=41666667? 检查：7*5952381=41666667. 继续。我们不需要分解它，但我们可以在程序中计算 n_mod = 10^18 % (p-1)，然后计算 r1^(n_mod) 等。若结果为1，则分母为零，我们需要特殊处理。但考虑到随机性和问题设计，可能分母不为零。为了安全，我们可以用符号计算方法：将整个 P(n) 表示为分式，分子和分母，然后代入数。分子分母都是整数（在 F_p 中），我们最终做一次逆元。</span><br><span class="line"></span><br><span class="line">我们可以将 P(n) 通分为：</span><br><span class="line">P(n) = [ - (1-r1^n)(1-r2^n) + D r1^&#123;n-1&#125;(1-r2^n) + E r2^&#123;n-1&#125;(1-r1^n) ] / [ (1-r1^n)(1-r2^n) ].</span><br><span class="line">这可以完全展开并简化。这可以避免分母为零的中间步骤吗？如果分母为零，分子也为零，我们可以取极限。但实际上我们期望分母模 p 非零。</span><br><span class="line"></span><br><span class="line">由于 p 很大且 n=10^18 是固定的，在代码中我们会计算 n_mod_p1 = n % (p-1)。如果 r1^&#123;n&#125; ≡ 1 则处理。不过，我们还可以从另一个角度：P(n) 是有理数，我们可以推导有理封闭形式。</span><br><span class="line"></span><br><span class="line">已知对于一般的n，P(n) 的表达式是什么？</span><br><span class="line">让我们尝试推导：</span><br><span class="line">从 P(n) = -1 + D r1^&#123;n-1&#125;/(1-r1^n) + E r2^&#123;n-1&#125;/(1-r2^n).</span><br><span class="line">注意到 D = 1 - 3/√5, E = 1 + 3/√5.</span><br><span class="line">设 u = r1^n, v = r2^n. 注意 r1 r2 = -4.</span><br><span class="line">1 - u 和 1 - v.</span><br><span class="line">我们要计算 P(n).</span><br><span class="line">我们可以用 u+v 和 u-v 等表达。因为 r1, r2 含有 √5，我们可以用斐波那契/卢卡斯数表达。</span><br><span class="line">已知 r1 = √5 - 1, r2 = -√5 - 1.</span><br><span class="line">考虑斐波那契数 F_k 和卢卡斯数 L_k，但它们通常是关于 φ 和 -1/φ 的。这里我们的底数是 r1, r2。我们可以直接计算 u, v。</span><br><span class="line"></span><br><span class="line">由于我们只需要写代码，我们可以在模 p 扩展中计算，或者直接在 F_p 中计算（因为 √5 存在）。</span><br><span class="line"></span><br><span class="line">最简单的实现方案：</span><br><span class="line"></span><br><span class="line">使用 C++，定义模数 p = 1000000009。</span><br><span class="line"></span><br><span class="line">编写 modpow, modinv。</span><br><span class="line"></span><br><span class="line">求 √5 mod p。可以使用标准算法。因为 p ≡ 1 mod 4? p = 1000000009 ≡ 1 mod 4? 1000000009 % 4 = 1。可以使用 Tonelli-Shanks，或者因为 5 是二次剩余，我们可以用 sqrt 函数？一般用模平方根算法。</span><br><span class="line"></span><br><span class="line">然后设 sqrt5 = 计算出的值。</span><br><span class="line"></span><br><span class="line">计算 r1 = (sqrt5 - 1 + p) % p; r2 = (-sqrt5 - 1 + p) % p; （注意模 p）</span><br><span class="line"></span><br><span class="line">计算 D = (1 - 3 * modinv(sqrt5) % p + p) % p; E = (1 + 3 * modinv(sqrt5) % p) % p;</span><br><span class="line"></span><br><span class="line">计算 n_mod = 10^18 % (p-1) (因为费马小定理，底数与 p 互素时指数可模 p-1。但底数 r1 或 r2 是否与 p 互素？需要检查。r1 = √5-1。若 √5-1 ≡ 0 mod p，则 √5 ≡ 1 =&gt; 5 ≡ 1 mod p，不对。所以互素。所以可约简指数。)</span><br><span class="line"></span><br><span class="line">计算 u = modpow(r1, n_mod), v = modpow(r2, n_mod).</span><br><span class="line"></span><br><span class="line">分母1: den1 = (1 - u + p) % p; den2 = (1 - v + p) % p.</span><br><span class="line"></span><br><span class="line">计算 term1 = D * modpow(r1, (n_mod - 1 + p-1) % (p-1)) % p * modinv(den1) % p; 等等。注意如果 n_mod == 0，则 n_mod - 1 应为 p-2。</span><br><span class="line"></span><br><span class="line">最后 P_mod = (-1 + term1 + term2) % p，再转为正数。结果就是所求的 q。</span><br><span class="line"></span><br><span class="line">但需要验证 P(2) 和 P(3) 来确保公式正确。</span><br><span class="line">让我们验证：对于 n=2。</span><br><span class="line">n=2, sqrt5 在模任何素数？我们先不模，直接代数计算。</span><br><span class="line">r1 = √5-1, r2 = -√5-1.</span><br><span class="line">u = r1^2 = (√5-1)^2 = 5 -2√5 +1 = 6 - 2√5.</span><br><span class="line">v = r2^2 = (√5+1)^2 = 6 + 2√5.</span><br><span class="line">1 - u = 1 - 6 + 2√5 = -5 + 2√5.</span><br><span class="line">1 - v = 1 - 6 - 2√5 = -5 - 2√5.</span><br><span class="line">r1^&#123;1&#125; = √5-1, r2^&#123;1&#125; = -√5-1.</span><br><span class="line">D = 1 - 3/√5 = (√5-3)/√5.</span><br><span class="line">E = 1 + 3/√5 = (√5+3)/√5.</span><br><span class="line">term1 = D * r1 / (1-u) = (√5-3)/√5 * (√5-1) / (2√5-5).</span><br><span class="line">term2 = E * r2 / (1-v) = (√5+3)/√5 * (-√5-1) / (-5-2√5).</span><br><span class="line">计算：</span><br><span class="line">1-u = 2√5-5 = √5(2 - √5)? 注意 2√5-5 = √5(2 - √5) = √5(2-√5). 而 r1 = √5-1 = -(1-√5).</span><br><span class="line">term1 = (√5-3)/√5 * (√5-1) / (2√5-5).</span><br><span class="line">注意 (√5-3)(√5-1) = 5 -√5 -3√5 +3 = 8 -4√5 = 4(2 - √5).</span><br><span class="line">分母：√5 * (2√5-5) = √5 * √5(2-√5)? 2√5-5 = √5(2-√5)? 不对，√5 * √5 = 5. √5(2-√5) = 2√5 - 5，正确。所以分母 = √5 * √5(2-√5) = 5(2-√5).</span><br><span class="line">因此 term1 = 4(2-√5) / (5(2-√5)) = 4/5.</span><br><span class="line">term2: (√5+3)/√5 * (-√5-1) / (-5-2√5) = (√5+3)(√5+1) / (√5(5+2√5))? 注意负号：分子有负，分母有负，抵消。 (-√5-1) = -(√5+1). (-5-2√5) = -(5+2√5). 所以正。</span><br><span class="line">(√5+3)(√5+1) = 5 + √5 + 3√5 + 3 = 8 + 4√5 = 4(2+√5).</span><br><span class="line">分母：√5(5+2√5) = 5√5 + 10 = 5(√5+2) = 5(2+√5).</span><br><span class="line">所以 term2 = 4(2+√5) / (5(2+√5)) = 4/5.</span><br><span class="line">P(2) = -1 + 4/5 + 4/5 = 3/5。正确！</span><br><span class="line"></span><br><span class="line">对于 n=3：</span><br><span class="line">我们可以在代码中验证。目前公式正确。</span><br><span class="line"></span><br><span class="line">因此我们的推导是正确的。</span><br><span class="line"></span><br><span class="line">现在考虑实现细节：</span><br><span class="line"></span><br><span class="line">我们需要计算 sqrt(5) mod 1000000009。</span><br><span class="line">p = 1000000009，是质数吗？是的，1000000009 是已知质数。</span><br><span class="line">计算 sqrt(5) mod p。可以使用 Tonelli-Shanks 算法。</span><br><span class="line"></span><br><span class="line">我们来写一个模平方根函数。或者，因为代码是固定的，我们可以预先计算（通过外部工具），但作为完整 C++ 实现，最好包含计算过程。我们可以简单地用 sqrt 函数通过检查。由于 p 约 1e9，我们可以用暴力？不行。需要使用算法。</span><br><span class="line"></span><br><span class="line">Tonelli-Shanks 算法步骤：</span><br><span class="line">输入：素数 p，整数 n（此处 n=5）。</span><br><span class="line">前提：n 是二次剩余 mod p。</span><br><span class="line"></span><br><span class="line">找到 Q, S 使得 p-1 = Q * 2^S，Q 奇数。</span><br><span class="line"></span><br><span class="line">找一个二次非剩余 z。</span><br><span class="line"></span><br><span class="line">初始化：</span><br><span class="line">M = S</span><br><span class="line">c = z^Q mod p</span><br><span class="line">t = n^Q mod p</span><br><span class="line">R = n^&#123;(Q+1)/2&#125; mod p</span><br><span class="line"></span><br><span class="line">循环 while t != 1:</span><br><span class="line">找最小 i (1 &lt;= i &lt; M) 使得 t^&#123;2^i&#125; ≡ 1 mod p。</span><br><span class="line">令 b = c^&#123;2^&#123;M-i-1&#125;&#125; mod p</span><br><span class="line">更新： M = i, c = b^2 mod p, t = t * b^2 mod p, R = R * b mod p</span><br><span class="line"></span><br><span class="line">返回 R（或 p - R，取较小正数？R^2 ≡ n mod p，取哪个都行）。</span><br><span class="line"></span><br><span class="line">我们需要一个函数判断二次剩余并找到平方根。</span><br><span class="line"></span><br><span class="line">也可以使用 Cipolla 算法，可能实现更简单（在扩展域中计算 (a + sqrt(a^2 - n))^&#123;(p+1)/2&#125;）。我们可以在 F_p[√(a^2 - n)] 中运算。不过 Tonelli-Shanks 也不错。</span><br><span class="line"></span><br><span class="line">由于用户明确要 C++ 实现，我将提供一个完整的 C++ 程序。</span><br><span class="line"></span><br><span class="line">程序结构：</span><br><span class="line"></span><br><span class="line">定义模数 P = 1000000009LL。</span><br><span class="line"></span><br><span class="line">编写取模加法、乘法、幂、逆元。</span><br><span class="line"></span><br><span class="line">实现 Tonelli-Shanks 求模平方根。</span><br><span class="line"></span><br><span class="line">计算 sqrt5。</span><br><span class="line"></span><br><span class="line">根据公式计算 P_n mod P。</span><br><span class="line"></span><br><span class="line">打印结果。</span><br><span class="line"></span><br><span class="line">边缘情况：如果 1 - u ≡ 0 mod P 或 1 - v ≡ 0 mod P。我们要检查。若发生，则需要极限计算。由于概率上极不可能，且问题设定下应不会发生，但我们可以加一个断言或处理。</span><br><span class="line"></span><br><span class="line">我们需要计算 n = 10^18。在 C++ 中可以用 unsigned long long 存储（最大 ~1.8e19）。所以 n 可以放进去。</span><br><span class="line"></span><br><span class="line">指数模 p-1：n_mod = n % (P-1)。注意 n 是 10^18，P-1 = 1000000008，都小于 2^63。我们直接做 n % (P-1)。</span><br><span class="line"></span><br><span class="line">计算 r1^&#123;n_mod - 1&#125; mod P。如果 n_mod == 0，则指数为 -1 mod (P-1) 即 P-2。因为 r1^&#123;p-1&#125; = 1（费马小定理）。</span><br><span class="line"></span><br><span class="line">我们可以先算 u = pow(r1, n_mod), v = pow(r2, n_mod)。</span><br><span class="line">然后分母 den1 = (1 - u + P) % P; den2 = (1 - v + P) % P。</span><br><span class="line">我们需要 den1 和 den2 的逆元。如果某个为零，则需特殊处理。我们暂且假设非零。</span><br><span class="line"></span><br><span class="line">最后 ans = (P - 1 + term1 + term2) % P; 由于 ans 应为正数，确保在 1 到 P-1 之间。</span><br><span class="line"></span><br><span class="line">让我们再检查下公式是否需要调整：</span><br><span class="line">我们之前有 P(n) = -1 + D * r1^&#123;n-1&#125;/(1 - r1^n) + E * r2^&#123;n-1&#125;/(1 - r2^n).</span><br><span class="line">注意 n 可能大于 P-1，但我们用 n_mod = n % (P-1) 计算 r1^n 和 r2^n。指数模 P-1 是有效的吗？由于底数 r1, r2 ∈ F_p 且非零，根据费马小定理，r^&#123;P-1&#125; ≡ 1，所以 r^n = r^&#123;n_mod&#125;。正确。</span><br><span class="line"></span><br><span class="line">但注意分子中有 r1^&#123;n-1&#125;。我们可以计算 pow(r1, (n_mod - 1 + P-1) % (P-1))。</span><br><span class="line"></span><br><span class="line">验证：假设 n_mod = 0，那么 n ≡ 0 mod (P-1)，即 n 是 P-1 的倍数。此时 r1^n ≡ 1，分母 den1 = 0。这就是我们提到的特殊情况。如果 n_mod = 0，则 u = 1, v = 1，分母为零。但 P-1 约 1e9，n = 1e18，n 是 P-1 的倍数吗？1000000008 * 1000 = 1,000,000,008,000 &gt; 1e12, * 1e6 = 1e18? 1000000008 * 1000000000 = 1,000,000,008,000,000,000 ≈ 1e18，但我们 n = 1e18 正好是 10^18。10^18 是否等于 1,000,000,008 * k? 我们检查 10^18 / 1000000008 ≈ 999.999... 实际上 1000000008 * 1,000,000,000 = 1,000,000,008,000,000,000 不等于 10^18。10^18 = 1,000,000,000,000,000,000。所以 n = 10^18 不完全能被 1000000008 整除。n_mod 会是非零。但我们要确切计算 n_mod = 10^18 % 1000000008。在代码中直接计算。</span><br><span class="line"></span><br><span class="line">所以分母应该非零。</span><br><span class="line"></span><br><span class="line">还有一点：我们使用的公式中的 r1, r2, D, E 都是基于 √5 的。但 √5 的符号选择会影响 r1 和 r2 的角色？如果我们选择另一个平方根（即负根），则 r1 和 r2 会交换。公式中的 D 和 E 也会相应变化，但最终 P(n) 应该相同，因为它是基于 r1, r2 的对称表达式。实际上，如果我们取 sqrt5 = -sqrt5_original，那么 r1&#x27; = -√5 - 1 = r2, r2&#x27; = √5 - 1 = r1。D&#x27; = 1 - 3/(-√5) = 1 + 3/√5 = E, E&#x27; = 1 - 3/√5 = D。所以整个和式不变。因此平方根的选择不影响结果。</span><br><span class="line"></span><br><span class="line">现在编写代码。</span><br><span class="line"></span><br><span class="line">让我们先草拟代码流程：</span><br><span class="line"></span><br><span class="line">cpp</span><br><span class="line">#include &lt;iostream&gt;</span><br><span class="line">#include &lt;cstdint&gt;</span><br><span class="line">#include &lt;cassert&gt;</span><br><span class="line"></span><br><span class="line">using namespace std;</span><br><span class="line"></span><br><span class="line">typedef long long ll;</span><br><span class="line">const ll P = 1000000009LL;</span><br><span class="line"></span><br><span class="line">ll mod_add(ll a, ll b) &#123; return (a + b) % P; &#125;</span><br><span class="line">ll mod_sub(ll a, ll b) &#123; return (a - b + P) % P; &#125;</span><br><span class="line">ll mod_mul(ll a, ll b) &#123; return (a * b) % P; &#125;</span><br><span class="line"></span><br><span class="line">ll mod_pow(ll a, ll e) &#123;</span><br><span class="line">    ll res = 1;</span><br><span class="line">    a %= P;</span><br><span class="line">    while (e) &#123;</span><br><span class="line">        if (e &amp; 1) res = mod_mul(res, a);</span><br><span class="line">        a = mod_mul(a, a);</span><br><span class="line">        e &gt;&gt;= 1;</span><br><span class="line">    &#125;</span><br><span class="line">    return res;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">ll mod_inv(ll a) &#123;</span><br><span class="line">    return mod_pow(a, P - 2);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">// 求模平方根，假设 a 是二次剩余，p 是奇素数</span><br><span class="line">ll mod_sqrt(ll a) &#123;</span><br><span class="line">    if (a == 0) return 0;</span><br><span class="line">    if (mod_pow(a, (P - 1) / 2) != 1) &#123;</span><br><span class="line">        // 不应该发生，因为 5 是二次剩余</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line">    // 简单实现 Tonelli-Shanks</span><br><span class="line">    // 分解 p-1 = Q * 2^S</span><br><span class="line">    ll Q = P - 1;</span><br><span class="line">    ll S = 0;</span><br><span class="line">    while (Q % 2 == 0) &#123;</span><br><span class="line">        Q /= 2;</span><br><span class="line">        S++;</span><br><span class="line">    &#125;</span><br><span class="line">    // 找一个二次非剩余</span><br><span class="line">    ll z = 2;</span><br><span class="line">    while (mod_pow(z, (P - 1) / 2) != P - 1) &#123;</span><br><span class="line">        z++;</span><br><span class="line">    &#125;</span><br><span class="line">    ll M = S;</span><br><span class="line">    ll c = mod_pow(z, Q);</span><br><span class="line">    ll t = mod_pow(a, Q);</span><br><span class="line">    ll R = mod_pow(a, (Q + 1) / 2);</span><br><span class="line">    while (t != 1) &#123;</span><br><span class="line">        // 找最小的 i 使得 t^&#123;2^i&#125; == 1</span><br><span class="line">        ll i = 1;</span><br><span class="line">        ll t2i = mod_mul(t, t);</span><br><span class="line">        while (t2i != 1) &#123;</span><br><span class="line">            t2i = mod_mul(t2i, t2i);</span><br><span class="line">            i++;</span><br><span class="line">        &#125;</span><br><span class="line">        ll b = mod_pow(c, 1LL &lt;&lt; (M - i - 1));</span><br><span class="line">        M = i;</span><br><span class="line">        c = mod_mul(b, b);</span><br><span class="line">        t = mod_mul(t, c);</span><br><span class="line">        R = mod_mul(R, b);</span><br><span class="line">    &#125;</span><br><span class="line">    return R;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int main() &#123;</span><br><span class="line">    ll sqrt5 = mod_sqrt(5);</span><br><span class="line">    // 验证</span><br><span class="line">    assert(mod_mul(sqrt5, sqrt5) == 5);</span><br><span class="line">    </span><br><span class="line">    ll r1 = mod_sub(sqrt5, 1); // sqrt5 - 1</span><br><span class="line">    ll r2 = mod_sub(P - sqrt5, 1); // -sqrt5 - 1</span><br><span class="line">    ll inv_sqrt5 = mod_inv(sqrt5);</span><br><span class="line">    ll D = mod_sub(1, mod_mul(3, inv_sqrt5)); // 1 - 3/sqrt5</span><br><span class="line">    ll E = mod_add(1, mod_mul(3, inv_sqrt5)); // 1 + 3/sqrt5</span><br><span class="line"></span><br><span class="line">    ll n = 1000000000000000000LL; // 10^18</span><br><span class="line">    ll n_mod = n % (P - 1);</span><br><span class="line">    </span><br><span class="line">    ll u = mod_pow(r1, n_mod);</span><br><span class="line">    ll v = mod_pow(r2, n_mod);</span><br><span class="line"></span><br><span class="line">    ll den1 = mod_sub(1, u);</span><br><span class="line">    ll den2 = mod_sub(1, v);</span><br><span class="line"></span><br><span class="line">    // 如果分母为零，需要特殊处理，但这里假设不会</span><br><span class="line">    ll term1 = mod_mul(D, mod_mul(mod_pow(r1, (n_mod - 1 + P - 1) % (P - 1)), mod_inv(den1)));</span><br><span class="line">    ll term2 = mod_mul(E, mod_mul(mod_pow(r2, (n_mod - 1 + P - 1) % (P - 1)), mod_inv(den2)));</span><br><span class="line"></span><br><span class="line">    ll P_mod = mod_add(mod_sub(term1, 1), term2); // term1 + term2 - 1</span><br><span class="line">    P_mod = (P_mod + P) % P;</span><br><span class="line">    if (P_mod == 0) P_mod = P; // 最简分数下，q 应该是在 1..P-1 之间</span><br><span class="line"></span><br><span class="line">    cout &lt;&lt; P_mod &lt;&lt; endl;</span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br><span class="line">等等，要再检查一下 term1 和 term2 的指数。</span><br><span class="line">term1 = D * r1^&#123;n-1&#125; / (1 - r1^n).</span><br><span class="line">我们使用 r1^&#123;n-1&#125; mod P. 因为 n_mod = n % (P-1)，那么 n = k(P-1) + n_mod.</span><br><span class="line">r1^&#123;n-1&#125; = r1^&#123;k(P-1) + n_mod - 1&#125; = (r1^&#123;P-1&#125;)^k * r1^&#123;n_mod - 1&#125; ≡ r1^&#123;n_mod - 1&#125; mod P.</span><br><span class="line">如果 n_mod == 0，则 n_mod - 1 = -1 ≡ P-2 mod (P-1)。公式 (n_mod - 1 + P - 1) % (P-1) 正确。</span><br><span class="line">因为 P-1 = 1000000008，n_mod 在 0 到 P-2 之间。所以这个指数处理正确。</span><br><span class="line"></span><br><span class="line">但是要注意：如果 n_mod == 0，则 u = r1^0 = 1，分母为零。我们已经假设 n_mod 不为零。实际 n = 10^18，我们来算一下 n_mod：</span><br><span class="line">P-1 = 1000000008.</span><br><span class="line">10^18 / 1000000008 ≈ 999999992. 等等，我们来计算准确值：1000000008 * 999999992 = ?</span><br><span class="line">1000000008 * 1,000,000,000 = 1,000,000,008,000,000,000.</span><br><span class="line">10^18 = 1,000,000,000,000,000,000.</span><br><span class="line">所以 1000000008 * 999,999,992 = 1000000008 * (1,000,000,000 - 8) = 1,000,000,008,000,000,000 - 8,000,000,064 = 999,999,999,999,999,936? 等等，我算错了。</span><br><span class="line">1,000,000,008 * 1,000,000,000 = 1,000,000,008,000,000,000 (这是 1.000000008e18)</span><br><span class="line">10^18 = 1,000,000,000,000,000,000 (这是 1e18)</span><br><span class="line">这两个数不一样！10^18 比 1,000,000,008,000,000,000 小！</span><br><span class="line">哦！1,000,000,008,000,000,000 是 1e18 + 8e9? 10^18 = 1,000,000,000,000,000,000. 1,000,000,008,000,000,000 是 1.000000008e18，大于 1e18。所以 1000000008 * 1,000,000,000 &gt; 10^18.</span><br><span class="line">10^18 / 1000000008 ≈ 999,999,992.000... 因为 1000000008 * 999,999,992 = ? 我们需要精确计算 n_mod = 10^18 % 1000000008.</span><br><span class="line">10^18 = 1,000,000,000,000,000,000.</span><br><span class="line">设 d = 1000000008.</span><br><span class="line">计算 10^18 mod d:</span><br><span class="line">我们可以用 10^18 = (10^9)^2。但更简单：在代码中它自然会算，因为 C++ 64 位可以处理 10^18。我们可以在代码中直接写 n = 1000000000000000000ULL; n_mod = n % (P-1); 编译器/运行时计算。这是精确的。</span><br><span class="line"></span><br><span class="line">测试：n_mod = 10^18 % 1000000008。因为 1000000008 * 999999992 = ?</span><br><span class="line">999999992 * 1000000008 = 999999992 * (1000000000 + 8) = 999999992000000000 + 7,999,999,936 = 999,999,999,999,999,936.</span><br><span class="line">10^18 - 这个数 = 1,000,000,000,000,000,000 - 999,999,999,999,999,936 = 64.</span><br><span class="line">所以 n_mod = 64！非常好，10^18 ≡ 64 mod 1000000008.</span><br><span class="line"></span><br><span class="line">因此 n_mod = 64，非零。分母不会为零。很好。</span><br><span class="line"></span><br><span class="line">现在公式中涉及 r1^&#123;n_mod&#125; 和 r2^&#123;n_mod&#125;，n_mod = 64，很小，但为了通用性我们仍使用快速幂。</span><br><span class="line"></span><br><span class="line">让我们验证 n_mod 的计算：</span><br><span class="line">1000000008 * 999999992 = 1000000008 * (1000000000 - 8) = 1000000008000000000 - 8000000064 = 999999999999999936.</span><br><span class="line">10^18 - 999999999999999936 = 64. 正确。所以 n_mod = 64。我们可以直接硬编码，但建议保留动态计算。</span><br><span class="line"></span><br><span class="line">现在检查 term1 和 term2 中 r1^&#123;n-1&#125; 的指数：因为 n_mod = 64，所以 (n_mod - 1) = 63。</span><br><span class="line">r1^&#123;63&#125; 和 r2^&#123;63&#125; 没问题。</span><br><span class="line"></span><br><span class="line">现在我们只需要验证对于 n=2 和 n=3，我们的程序框架能否得出 3/5 和 9/31 模 P 的正确结果。我们可以在代码中做测试（但最终提交时不必包含测试，只是自己验证）。作为回答，我们可以提供带有主函数的完整 C++ 代码。</span><br><span class="line"></span><br><span class="line">但要注意，我们推导的 P(n) 公式是否对所有 n 成立？我们是从 P(n) = (1/n) sum_&#123;j&#125; G(ω^j) 推导的，它依赖于 n 个根之和，但这是针对正整数 n 的精确公式。我们使用部分分式展开，这对所有 n 成立（只要 n 是正整数）。对于 n=2 和 3 已验证。所以公式正确。</span><br><span class="line"></span><br><span class="line">现在实现细节：</span><br><span class="line"></span><br><span class="line">使用 unsigned long long 还是 long long？由于 P ~ 1e9，乘法最大 (1e9-1)^2 ≈ 1e18，刚好在 64 位有符号正数范围内（最大 9.22e18）。为了安全，我们可以使用 unsigned long long 或 __int128，但普通乘法 (a * b) % P 如果 a,b &lt; P，则 a*b &lt; 1e18 &lt; 2^63-1（约 9.22e18）。所以直接使用 long long 没问题。</span><br><span class="line"></span><br><span class="line">快速幂中，我们使用 mod_mul。</span><br><span class="line"></span><br><span class="line">现在让我们确保 Tonelli-Shanks 实现正确。</span><br><span class="line">p = 1000000009.</span><br><span class="line">p-1 = 1000000008 = 8 * 125000001? 125000001 是奇数吗？125000001 不能被 2 整除，是的。</span><br><span class="line">所以 S = 3, Q = 125000001? 1000000008 / 8 = 125000001. 是的。</span><br><span class="line">我们需要一个二次非剩余 z。测试 z=2: 2^((P-1)/2) mod P = 2^500000004 mod P. 是否等于 P-1? 由于 2 经常是二次非剩余 mod p 如果 p ≡ 3,5 mod 8? p=1000000009. 1000000009 mod 8 = 1000000009 % 8 = 1? 因为 1000000000 % 8 = 0, 所以 1000000009 % 8 = 1. 因此 2 是二次剩余（根据二次互反律补充律，2 是二次剩余 mod p 当 p ≡ ±1 mod 8）。所以 2 是二次剩余！我们需要找一个非剩余。测试 z=3？或者 z=5？我们可以简单地循环直到找到。通常很小。</span><br><span class="line">我们可以在代码中循环 z=2,3,5,... 直到 Legendre 符号为 -1。</span><br><span class="line">对于 p=1000000009，z=3 可能是非剩余？我们不需要预先知道，代码会循环找到。</span><br><span class="line"></span><br><span class="line">注意 Tonelli-Shanks 的 while 循环内部：</span><br><span class="line">寻找最小的 i 使得 t^&#123;2^i&#125; ≡ 1 mod P。</span><br><span class="line">我们可以从 i=1 开始，设 cur = tt % P，如果 cur == 1 则找到 i=1；否则 cur = curcur % P 等。</span><br><span class="line">需要小心不要让 i 超过 M。M 初始为 S=3。S 很小！因为 P-1 = 8 * 奇数，所以 S=3。那么 M 最多为 3。这使得 Tonelli-Shanks 非常简单。实际上 S=3，意味着我们只需要几轮。</span><br><span class="line"></span><br><span class="line">我们可以手工预计算 sqrt5，但为了完整性，包含算法。</span><br><span class="line"></span><br><span class="line">另外我们可以使用 Cipolla 算法：对于奇素数 p，计算平方根的 Cipolla 算法：</span><br><span class="line">选择一个随机数 a，使得 (a^2 - n) 是二次非剩余，然后在域 F_p[√(a^2 - n)] 中计算 (a + √(a^2 - n))^&#123;(p+1)/2&#125; 的“实部”。这个可能更容易实现。但两种都可以。</span><br><span class="line"></span><br><span class="line">在这里，我选择实现 Tonelli-Shanks，因为 S 很小，它非常快。</span><br><span class="line"></span><br><span class="line">再审视 Tonelli-Shanks 步骤：</span><br><span class="line"></span><br><span class="line">text</span><br><span class="line">Q = P-1, S = 0</span><br><span class="line">while Q % 2 == 0: Q/=2, S++</span><br><span class="line">// 此时 p-1 = Q * 2^S</span><br><span class="line">z = 2</span><br><span class="line">while Legendre(z) != -1: z++</span><br><span class="line">// z 是非剩余</span><br><span class="line">M = S</span><br><span class="line">c = z^Q % P</span><br><span class="line">t = n^Q % P</span><br><span class="line">R = n^((Q+1)/2) % P</span><br><span class="line">while t != 1:</span><br><span class="line">    i = 1</span><br><span class="line">    t2i = t * t % P</span><br><span class="line">    while t2i != 1:</span><br><span class="line">        t2i = t2i * t2i % P</span><br><span class="line">        i = i + 1</span><br><span class="line">    b = c^&#123;2^&#123;M-i-1&#125;&#125; % P</span><br><span class="line">    M = i</span><br><span class="line">    c = b * b % P</span><br><span class="line">    t = t * c % P</span><br><span class="line">    R = R * b % P</span><br><span class="line">return R</span><br><span class="line">对于 p=1000000009，S=3, Q=125000001.</span><br><span class="line">如果 t=1 初始，则直接返回 R。</span><br><span class="line">我们可以在代码中实现。</span><br><span class="line"></span><br><span class="line">现在验证我们的最终结果是否唯一确定。Q 函数定义：对于素数 p 和最简分数 a/b，Q(a/b, p) = 满足 a ≡ b q (mod p) 的最小正整数 q。也就是 q ≡ a * b^&#123;-1&#125; mod p 的最小正数。我们计算的 P_mod = P(n) mod p 就是 a * b^&#123;-1&#125; mod p 的标准表示（在 0 到 p-1 之间）。但 q 要求最小正整数，所以如果 P_mod == 0，那意味着 a ≡ 0 mod p，但 P(n) 概率不会是 0，且 p 很大，所以 P_mod 应该在 1..p-1 之间。我们直接输出 P_mod 即可。</span><br><span class="line"></span><br><span class="line">接下来，我们再验证一下 P(n) 的公式是否可能产生负数模 p。我们已经做了 mod 处理。</span><br><span class="line"></span><br><span class="line">现在写出最终的 C++ 代码。</span><br><span class="line"></span><br><span class="line">我将代码结构化：定义常量 P = 1000000009；定义 n = 10^18。所有运算用函数封装。</span><br><span class="line"></span><br><span class="line">还要注意：我们要确保 mod_inv 在参数为 0 时不调用。分母 den1, den2 不应为 0。如果出现 0，则说明 1 - r1^n ≡ 0，即 r1^n = 1。因为 n_mod = 64，我们应确认 r1^64 不为 1。我们不提前计算，但可以加断言。</span><br><span class="line"></span><br><span class="line">代码中需要 #include &lt;iostream&gt; 等。</span><br><span class="line"></span><br><span class="line">我将提供一个单独的文件，包含 main 函数，计算并输出结果。</span><br><span class="line"></span><br><span class="line">让我们再确认 Q 函数的定义与我们的模计算结果一致。Q(a/b, p) = min q &gt; 0 s.t. a ≡ b q (mod p)。我们知道 a/b 是最简分数，且 p 是素数，b 与 p 互素（否则模方程可能无解或分母为 p 的倍数）。由于 P(n) 分母可能包含 p 的因子吗？p=1000000009 是素数，P(n) 的分母可能很大，但一般不会刚好是 p 的倍数，因为 p 很大且是任意定的。如果 b ≡ 0 mod p，那么 Q 未定义？题目暗示可以计算，所以 b 与 p 互素。所以 mod_inv(b) 存在。我们计算 a * inv(b) mod p 即可。</span><br><span class="line"></span><br><span class="line">现在编写代码。</span><br><span class="line"></span><br><span class="line">注意，Tonelli-Shanks 中计算 c^&#123;2^&#123;M-i-1&#125;&#125;：因为 M 和 i 都很小，我们可以直接用循环计算指数。</span><br><span class="line">用 b = c; for (int j=0; j &lt; M - i - 1; ++j) b = mod_mul(b, b);</span><br><span class="line"></span><br><span class="line">另外，对于 Legendre 符号 (a/p) 我们用 mod_pow(a, (P-1)/2) 如果等于 1 则是二次剩余，等于 P-1 则是非剩余。</span><br><span class="line"></span><br><span class="line">我们来完成 C++ 代码。</span><br></pre></td></tr></table></figure>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;cassert&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="keyword">typedef</span> <span class="type">long</span> <span class="type">long</span> ll;</span><br><span class="line"></span><br><span class="line"><span class="type">const</span> ll P = <span class="number">1000000009LL</span>;</span><br><span class="line"><span class="type">const</span> ll N = <span class="number">1000000000000000000LL</span>; <span class="comment">// 10^18</span></span><br><span class="line"></span><br><span class="line"><span class="comment">// 模运算</span></span><br><span class="line"><span class="function">ll <span class="title">mod_add</span><span class="params">(ll a, ll b)</span> </span>&#123; <span class="keyword">return</span> (a + b) % P; &#125;</span><br><span class="line"><span class="function">ll <span class="title">mod_sub</span><span class="params">(ll a, ll b)</span> </span>&#123; <span class="keyword">return</span> (a - b + P) % P; &#125;</span><br><span class="line"><span class="function">ll <span class="title">mod_mul</span><span class="params">(ll a, ll b)</span> </span>&#123; <span class="keyword">return</span> (a * b) % P; &#125;</span><br><span class="line"></span><br><span class="line"><span class="function">ll <span class="title">mod_pow</span><span class="params">(ll a, ll e)</span> </span>&#123;</span><br><span class="line">    ll res = <span class="number">1</span>;</span><br><span class="line">    a %= P;</span><br><span class="line">    <span class="keyword">while</span> (e) &#123;</span><br><span class="line">        <span class="keyword">if</span> (e &amp; <span class="number">1</span>) res = <span class="built_in">mod_mul</span>(res, a);</span><br><span class="line">        a = <span class="built_in">mod_mul</span>(a, a);</span><br><span class="line">        e &gt;&gt;= <span class="number">1</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> res;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function">ll <span class="title">mod_inv</span><span class="params">(ll a)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">return</span> <span class="built_in">mod_pow</span>(a, P - <span class="number">2</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// Legendre 符号 (a / P)</span></span><br><span class="line"><span class="function">ll <span class="title">legendre</span><span class="params">(ll a)</span> </span>&#123;</span><br><span class="line">    ll res = <span class="built_in">mod_pow</span>(a, (P - <span class="number">1</span>) / <span class="number">2</span>);</span><br><span class="line">    <span class="keyword">return</span> res == P - <span class="number">1</span> ? <span class="number">-1</span> : res; <span class="comment">// 1 表示平方剩余，-1 表示非剩余</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// Tonelli-Shanks 求模平方根，假设 a 是二次剩余，P 是奇素数</span></span><br><span class="line"><span class="function">ll <span class="title">mod_sqrt</span><span class="params">(ll a)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (a == <span class="number">0</span>) <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    <span class="built_in">assert</span>(<span class="built_in">legendre</span>(a) == <span class="number">1</span>); <span class="comment">// 确保 a 是二次剩余</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 分解 P-1 = Q * 2^S，Q 为奇数</span></span><br><span class="line">    ll Q = P - <span class="number">1</span>;</span><br><span class="line">    ll S = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">while</span> (Q % <span class="number">2</span> == <span class="number">0</span>) &#123;</span><br><span class="line">        Q /= <span class="number">2</span>;</span><br><span class="line">        ++S;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 找一个二次非剩余 z</span></span><br><span class="line">    ll z = <span class="number">2</span>;</span><br><span class="line">    <span class="keyword">while</span> (<span class="built_in">legendre</span>(z) != <span class="number">-1</span>) ++z;</span><br><span class="line"></span><br><span class="line">    ll M = S;</span><br><span class="line">    ll c = <span class="built_in">mod_pow</span>(z, Q);</span><br><span class="line">    ll t = <span class="built_in">mod_pow</span>(a, Q);</span><br><span class="line">    ll R = <span class="built_in">mod_pow</span>(a, (Q + <span class="number">1</span>) / <span class="number">2</span>);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">while</span> (t != <span class="number">1</span>) &#123;</span><br><span class="line">        <span class="comment">// 找最小的 i 使得 t^&#123;2^i&#125; ≡ 1 mod P</span></span><br><span class="line">        ll i = <span class="number">1</span>;</span><br><span class="line">        ll t2i = <span class="built_in">mod_mul</span>(t, t);</span><br><span class="line">        <span class="keyword">while</span> (t2i != <span class="number">1</span>) &#123;</span><br><span class="line">            t2i = <span class="built_in">mod_mul</span>(t2i, t2i);</span><br><span class="line">            ++i;</span><br><span class="line">        &#125;</span><br><span class="line">        ll b = c;</span><br><span class="line">        <span class="keyword">for</span> (ll j = <span class="number">0</span>; j &lt; M - i - <span class="number">1</span>; ++j)</span><br><span class="line">            b = <span class="built_in">mod_mul</span>(b, b);</span><br><span class="line">        M = i;</span><br><span class="line">        c = <span class="built_in">mod_mul</span>(b, b);</span><br><span class="line">        t = <span class="built_in">mod_mul</span>(t, c);</span><br><span class="line">        R = <span class="built_in">mod_mul</span>(R, b);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> R;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="comment">// 1. 计算 √5 mod P</span></span><br><span class="line">    ll sqrt5 = <span class="built_in">mod_sqrt</span>(<span class="number">5</span>);</span><br><span class="line">    <span class="built_in">assert</span>(<span class="built_in">mod_mul</span>(sqrt5, sqrt5) == <span class="number">5</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 2. 根据推导的公式计算参数</span></span><br><span class="line">    ll r1 = <span class="built_in">mod_sub</span>(sqrt5, <span class="number">1</span>);               <span class="comment">// √5 - 1</span></span><br><span class="line">    ll r2 = <span class="built_in">mod_sub</span>(P - sqrt5, <span class="number">1</span>);           <span class="comment">// -√5 - 1</span></span><br><span class="line">    ll inv_sqrt5 = <span class="built_in">mod_inv</span>(sqrt5);</span><br><span class="line">    ll D = <span class="built_in">mod_sub</span>(<span class="number">1</span>, <span class="built_in">mod_mul</span>(<span class="number">3</span>, inv_sqrt5)); <span class="comment">// 1 - 3/√5</span></span><br><span class="line">    ll E = <span class="built_in">mod_add</span>(<span class="number">1</span>, <span class="built_in">mod_mul</span>(<span class="number">3</span>, inv_sqrt5)); <span class="comment">// 1 + 3/√5</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 3. 指数化简 (模 P-1)</span></span><br><span class="line">    ll n_mod = N % (P - <span class="number">1</span>);                  <span class="comment">// N = 10^18</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 4. 计算 r1^n 和 r2^n 模 P</span></span><br><span class="line">    ll u = <span class="built_in">mod_pow</span>(r1, n_mod);</span><br><span class="line">    ll v = <span class="built_in">mod_pow</span>(r2, n_mod);</span><br><span class="line"></span><br><span class="line">    ll den1 = <span class="built_in">mod_sub</span>(<span class="number">1</span>, u);</span><br><span class="line">    ll den2 = <span class="built_in">mod_sub</span>(<span class="number">1</span>, v);</span><br><span class="line">    <span class="comment">// 分母不应为零（经计算 n_mod = 64，确实不为零）</span></span><br><span class="line">    <span class="built_in">assert</span>(den1 != <span class="number">0</span> &amp;&amp; den2 != <span class="number">0</span>);</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 5. 计算两项的值</span></span><br><span class="line">    ll exp = (n_mod - <span class="number">1</span> + P - <span class="number">1</span>) % (P - <span class="number">1</span>);</span><br><span class="line">    ll term1 = <span class="built_in">mod_mul</span>(D, <span class="built_in">mod_mul</span>(<span class="built_in">mod_pow</span>(r1, exp), <span class="built_in">mod_inv</span>(den1)));</span><br><span class="line">    ll term2 = <span class="built_in">mod_mul</span>(E, <span class="built_in">mod_mul</span>(<span class="built_in">mod_pow</span>(r2, exp), <span class="built_in">mod_inv</span>(den2)));</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 6. 合成最终结果 P(10^18) mod P</span></span><br><span class="line">    ll ans = <span class="built_in">mod_add</span>(<span class="built_in">mod_sub</span>(term1, <span class="number">1</span>), term2);</span><br><span class="line">    <span class="keyword">if</span> (ans == <span class="number">0</span>) ans = P;  <span class="comment">// 最简分数下 q 应介于 1 和 P-1 之间</span></span><br><span class="line"></span><br><span class="line">    std::cout &lt;&lt; ans &lt;&lt; std::endl;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
