span> <span class="string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;fstream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;sstream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;vector&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;string&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;map&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;algorithm&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;cstring&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"><span class="type">const</span> <span class="type">int</span> MAXN = <span class="number">505</span>;</span><br><span class="line"><span class="type">const</span> <span class="type">long</span> <span class="type">long</span> MOD = <span class="number">999999937</span>;</span><br><span class="line"></span><br><span class="line"><span class="type">int</span> bed_mate[MAXN], desk_mate[MAXN];</span><br><span class="line"><span class="type">bool</span> visited[MAXN];</span><br><span class="line"></span><br><span class="line"><span class="comment">// 读取逗号分隔的配对文件</span></span><br><span class="line">vector&lt;pair&lt;<span class="type">int</span>,<span class="type">int</span>&gt;&gt; <span class="built_in">read_pairs</span>(<span class="type">const</span> string&amp; filename) &#123;</span><br><span class="line">    <span class="function">ifstream <span class="title">fin</span><span class="params">(filename)</span></span>;</span><br><span class="line">    string line;</span><br><span class="line">    vector&lt;pair&lt;<span class="type">int</span>,<span class="type">int</span>&gt;&gt; res;</span><br><span class="line">    <span class="keyword">while</span> (<span class="built_in">getline</span>(fin, line)) &#123;</span><br><span class="line">        <span class="comment">// 移除所有空格</span></span><br><span class="line">        line.<span class="built_in">erase</span>(<span class="built_in">remove_if</span>(line.<span class="built_in">begin</span>(), line.<span class="built_in">end</span>(), ::isspace), line.<span class="built_in">end</span>());</span><br><span class="line">        <span class="keyword">if</span> (line.<span class="built_in">empty</span>()) <span class="keyword">continue</span>;</span><br><span class="line">        <span class="type">size_t</span> comma = line.<span class="built_in">find</span>(<span class="string">&#x27;,&#x27;</span>);</span><br><span class="line">        <span class="keyword">if</span> (comma == string::npos) <span class="keyword">continue</span>;</span><br><span class="line">        <span class="type">int</span> u = <span class="built_in">stoi</span>(line.<span class="built_in">substr</span>(<span class="number">0</span>, comma));</span><br><span class="line">        <span class="type">int</span> v = <span class="built_in">stoi</span>(line.<span class="built_in">substr</span>(comma + <span class="number">1</span>));</span><br><span class="line">        res.<span class="built_in">push_back</span>(&#123;u, v&#125;);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> res;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="comment">// 初始化</span></span><br><span class="line">    <span class="built_in">memset</span>(bed_mate, <span class="number">0</span>, <span class="built_in">sizeof</span>(bed_mate));</span><br><span class="line">    <span class="built_in">memset</span>(desk_mate, <span class="number">0</span>, <span class="built_in">sizeof</span>(desk_mate));</span><br><span class="line">    <span class="built_in">memset</span>(visited, <span class="number">0</span>, <span class="built_in">sizeof</span>(visited));</span><br><span class="line"></span><br><span class="line">    <span class="keyword">auto</span> beds = <span class="built_in">read_pairs</span>(<span class="string">&quot;beds.txt&quot;</span>);</span><br><span class="line">    <span class="keyword">auto</span> desks = <span class="built_in">read_pairs</span>(<span class="string">&quot;desks.txt&quot;</span>);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">auto</span> &amp;p : beds) &#123;</span><br><span class="line">        <span class="type">int</span> u = p.first, v = p.second;</span><br><span class="line">        bed_mate[u] = v;</span><br><span class="line">        bed_mate[v] = u;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">auto</span> &amp;p : desks) &#123;</span><br><span class="line">        <span class="type">int</span> u = p.first, v = p.second;</span><br><span class="line">        desk_mate[u] = v;</span><br><span class="line">        desk_mate[v] = u;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="type">int</span> n = <span class="number">500</span>; <span class="comment">// 题目给定的学生总数</span></span><br><span class="line">    map&lt;string, <span class="type">int</span>&gt; comp_count;</span><br><span class="line">    map&lt;string, <span class="type">long</span> <span class="type">long</span>&gt; comp_aut;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">1</span>; i &lt;= n; ++i) &#123;</span><br><span class="line">        <span class="keyword">if</span> (visited[i]) <span class="keyword">continue</span>;</span><br><span class="line"></span><br><span class="line">        <span class="comment">// 提取连通分量</span></span><br><span class="line">        vector&lt;<span class="type">int</span>&gt; comp_nodes;</span><br><span class="line">        vector&lt;<span class="type">int</span>&gt; stack = &#123;i&#125;;</span><br><span class="line">        visited[i] = <span class="literal">true</span>;</span><br><span class="line">        <span class="keyword">while</span> (!stack.<span class="built_in">empty</span>()) &#123;</span><br><span class="line">            <span class="type">int</span> u = stack.<span class="built_in">back</span>(); stack.<span class="built_in">pop_back</span>();</span><br><span class="line">            comp_nodes.<span class="built_in">push_back</span>(u);</span><br><span class="line">            <span class="keyword">if</span> (bed_mate[u] != <span class="number">0</span> &amp;&amp; !visited[bed_mate[u]]) &#123;</span><br><span class="line">                visited[bed_mate[u]] = <span class="literal">true</span>;</span><br><span class="line">                stack.<span class="built_in">push_back</span>(bed_mate[u]);</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="keyword">if</span> (desk_mate[u] != <span class="number">0</span> &amp;&amp; !visited[desk_mate[u]]) &#123;</span><br><span class="line">                visited[desk_mate[u]] = <span class="literal">true</span>;</span><br><span class="line">                stack.<span class="built_in">push_back</span>(desk_mate[u]);</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="type">int</span> m = comp_nodes.<span class="built_in">size</span>();</span><br><span class="line">        <span class="type">int</span> bed_edges = <span class="number">0</span>, desk_edges = <span class="number">0</span>;</span><br><span class="line">        <span class="type">int</span> deg1_nodes = <span class="number">0</span>;</span><br><span class="line">        <span class="type">char</span> end1 = <span class="number">0</span>, end2 = <span class="number">0</span>;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">for</span> (<span class="type">int</span> u : comp_nodes) &#123;</span><br><span class="line">            <span class="type">int</span> deg = <span class="number">0</span>;</span><br><span class="line">            <span class="keyword">if</span> (bed_mate[u] != <span class="number">0</span>) &#123;</span><br><span class="line">                bed_edges++;</span><br><span class="line">                deg++;</span><br><span class="line">                <span class="keyword">if</span> (desk_mate[u] == <span class="number">0</span>) &#123; <span class="comment">// 只有床位边</span></span><br><span class="line">                    <span class="keyword">if</span> (deg1_nodes == <span class="number">0</span>) end1 = <span class="string">&#x27;B&#x27;</span>;</span><br><span class="line">                    <span class="keyword">else</span> end2 = <span class="string">&#x27;B&#x27;</span>;</span><br><span class="line">                    deg1_nodes++;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="keyword">if</span> (desk_mate[u] != <span class="number">0</span>) &#123;</span><br><span class="line">                desk_edges++;</span><br><span class="line">                deg++;</span><br><span class="line">                <span class="keyword">if</span> (bed_mate[u] == <span class="number">0</span>) &#123; <span class="comment">// 只有座位边</span></span><br><span class="line">                    <span class="keyword">if</span> (deg1_nodes == <span class="number">0</span>) end1 = <span class="string">&#x27;D&#x27;</span>;</span><br><span class="line">                    <span class="keyword">else</span> end2 = <span class="string">&#x27;D&#x27;</span>;</span><br><span class="line">                    deg1_nodes++;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="keyword">if</span> (deg == <span class="number">0</span>) &#123; <span class="comment">// 孤立点</span></span><br><span class="line">                <span class="keyword">if</span> (deg1_nodes == <span class="number">0</span>) end1 = <span class="string">&#x27;I&#x27;</span>;</span><br><span class="line">                <span class="keyword">else</span> end2 = <span class="string">&#x27;I&#x27;</span>;</span><br><span class="line">                deg1_nodes++;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        bed_edges /= <span class="number">2</span>;</span><br><span class="line">        desk_edges /= <span class="number">2</span>;</span><br><span class="line"></span><br><span class="line">        string type;</span><br><span class="line">        <span class="type">long</span> <span class="type">long</span> aut = <span class="number">1</span>;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (m == <span class="number">1</span>) &#123;</span><br><span class="line">            type = <span class="string">&quot;iso&quot;</span>;</span><br><span class="line">            aut = <span class="number">1</span>;</span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (m == <span class="number">2</span>) &#123;</span><br><span class="line">            <span class="keyword">if</span> (bed_edges == <span class="number">1</span> &amp;&amp; desk_edges == <span class="number">0</span>) &#123;</span><br><span class="line">                type = <span class="string">&quot;B2&quot;</span>; aut = <span class="number">2</span>;</span><br><span class="line">            &#125; <span class="keyword">else</span> <span class="keyword">if</span> (bed_edges == <span class="number">0</span> &amp;&amp; desk_edges == <span class="number">1</span>) &#123;</span><br><span class="line">                type = <span class="string">&quot;D2&quot;</span>; aut = <span class="number">2</span>;</span><br><span class="line">            &#125; <span class="keyword">else</span> <span class="keyword">if</span> (bed_edges == <span class="number">1</span> &amp;&amp; desk_edges == <span class="number">1</span>) &#123;</span><br><span class="line">                type = <span class="string">&quot;BD2&quot;</span>; aut = <span class="number">2</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125; <span class="keyword">else</span> &#123; <span class="comment">// m &gt;= 3</span></span><br><span class="line">            <span class="keyword">if</span> (deg1_nodes == <span class="number">2</span>) &#123; <span class="comment">// 链条型路径</span></span><br><span class="line">                <span class="keyword">if</span> (end1 == <span class="string">&#x27;B&#x27;</span> &amp;&amp; end2 == <span class="string">&#x27;B&#x27;</span>) &#123;</span><br><span class="line">                    type = <span class="string">&quot;path_BB_&quot;</span> + <span class="built_in">to_string</span>(m);</span><br><span class="line">                    aut = <span class="number">2</span>;</span><br><span class="line">                &#125; <span class="keyword">else</span> <span class="keyword">if</span> (end1 == <span class="string">&#x27;D&#x27;</span> &amp;&amp; end2 == <span class="string">&#x27;D&#x27;</span>) &#123;</span><br><span class="line">                    type = <span class="string">&quot;path_DD_&quot;</span> + <span class="built_in">to_string</span>(m);</span><br><span class="line">                    aut = <span class="number">2</span>;</span><br><span class="line">                &#125; <span class="keyword">else</span> &#123; <span class="comment">// 一个B一个D</span></span><br><span class="line">                    type = <span class="string">&quot;path_BD_&quot;</span> + <span class="built_in">to_string</span>(m);</span><br><span class="line">                    aut = <span class="number">1</span>;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125; <span class="keyword">else</span> <span class="keyword">if</span> (deg1_nodes == <span class="number">0</span>) &#123; <span class="comment">// 闭环</span></span><br><span class="line">                <span class="type">int</span> k = m / <span class="number">2</span>;</span><br><span class="line">                <span class="keyword">if</span> (bed_edges == k &amp;&amp; desk_edges == k) &#123;</span><br><span class="line">                    type = <span class="string">&quot;cycle_&quot;</span> + <span class="built_in">to_string</span>(k);</span><br><span class="line">                    aut = <span class="number">2</span> * k;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        comp_count[type]++;</span><br><span class="line">        comp_aut[type] = aut; <span class="comment">// 同类型自同构数相同，重复赋值无妨</span></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 预计算阶乘</span></span><br><span class="line">    <span class="function">vector&lt;<span class="type">long</span> <span class="type">long</span>&gt; <span class="title">fact</span><span class="params">(n + <span class="number">1</span>, <span class="number">1</span>)</span></span>;</span><br><span class="line">    <span class="keyword">for</span> (<span class="type">int</span> i = <span class="number">1</span>; i &lt;= n; ++i) &#123;</span><br><span class="line">        fact[i] = fact[i - <span class="number">1</span>] * i % MOD;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 快速幂</span></span><br><span class="line">    <span class="keyword">auto</span> modpow = [](<span class="type">long</span> <span class="type">long</span> a, <span class="type">long</span> <span class="type">long</span> e) &#123;</span><br><span class="line">        <span class="type">long</span> <span class="type">long</span> res = <span class="number">1</span>;</span><br><span class="line">        <span class="keyword">while</span> (e) &#123;</span><br><span class="line">            <span class="keyword">if</span> (e &amp; <span class="number">1</span>) res = res * a % MOD;</span><br><span class="line">            a = a * a % MOD;</span><br><span class="line">            e &gt;&gt;= <span class="number">1</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> res;</span><br><span class="line">    &#125;;</span><br><span class="line"></span><br><span class="line">    <span class="type">long</span> <span class="type">long</span> ans = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">auto</span> &amp;p : comp_count) &#123;</span><br><span class="line">        <span class="type">const</span> string &amp;type = p.first;</span><br><span class="line">        <span class="type">int</span> c = p.second;</span><br><span class="line">        <span class="type">long</span> <span class="type">long</span> a = comp_aut[type];</span><br><span class="line">        ans = ans * fact[c] % MOD;</span><br><span class="line">        ans = ans * <span class="built_in">modpow</span>(a, c) % MOD;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    cout &lt;&lt; ans &lt;&lt; endl;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
